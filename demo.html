<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFD100">
  <title>周末规划助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      background: #000;
      background-image:
        radial-gradient(ellipse 100% 80% at 15% 5%, rgba(255,209,0,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 85% 90%, rgba(255,194,0,0.15) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(120,40,0,0.10) 0%, transparent 60%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    .app-wrapper { zoom:0.8; display:flex; flex-direction:row; align-items:center; gap:16px; padding:24px; }

    /* 主题色 */
    .mt-grad{background:linear-gradient(135deg,#FFD100,#FFC200);}
    .mt-grad-light{background:linear-gradient(135deg,#fff3ec,#fffaec);}

    /* 气泡 */
    .bubble-user{background:linear-gradient(135deg,#FFD100,#FFC200);color:#1a1200;border-radius:18px 18px 4px 18px;}
    .bubble-ai{background:white;border-radius:4px 18px 18px 18px;box-shadow:0 2px 12px rgba(0,0,0,.08);}

    /* 思考动画 */
    @keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    .tdot{animation:tdot 1.4s ease-in-out infinite;}
    .tdot:nth-child(2){animation-delay:.16s} .tdot:nth-child(3){animation-delay:.32s}

    /* ReAct 步骤行 */
    @keyframes stepIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    .step-line{animation:stepIn .25s ease forwards;opacity:0;}

    /* 方案卡片 */
    .plan-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.10);}

    /* 思考链面板（参考主流大模型 App 交互）*/
    .thinking-chain{
      width:100%;
      max-width:280px;
      margin:4px 0 4px 0;
    }
    .thinking-chain details{
      border-radius:14px;
      overflow:hidden;
    }
    .thinking-chain summary{
      display:flex;align-items:center;gap:6px;
      padding:9px 12px;
      cursor:pointer;
      user-select:none;
      color:#374151;
      font-size:13px;font-weight:600;
      background:linear-gradient(135deg,#fff7ed,#fff3ec);
      border-radius:14px;
      list-style:none;
      border:1px solid #fde8d4;
      transition:background .15s;
    }
    .thinking-chain details[open] summary{
      border-radius:14px 14px 0 0;
      border-bottom-color:#fde8d4;
    }
    .thinking-chain summary:hover{background:#fff3ec;}
    .thinking-chain summary::-webkit-details-marker{display:none;}
    .thinking-chain .tc-spin{
      width:14px;height:14px;border-radius:50%;
      border:2px solid #ffd9bd;
      border-top-color:#FFD100;
      animation:tcSpin .8s linear infinite;
      flex-shrink:0;
    }
    @keyframes tcSpin{to{transform:rotate(360deg)}}
    .thinking-chain .tc-check{
      color:#22c55e;font-size:14px;line-height:1;
    }
    .thinking-chain .tc-chevron{
      margin-left:auto;font-size:10px;
      transition:transform .2s;color:#9ca3af;
    }
    .thinking-chain details[open] .tc-chevron{transform:rotate(180deg);}
    .thinking-chain .tc-body{
      background:#fffbf7;
      border:1px solid #fde8d4;
      border-top:none;
      border-radius:0 0 14px 14px;
      padding:10px 12px 12px;
      font-size:12px;line-height:1.75;
      color:#374151;
      white-space:pre-wrap;word-break:break-word;
      max-height:240px;overflow-y:auto;
      min-height:24px;
    }
    .thinking-chain .tc-body:empty::before{
      content:'（思维链生成中…）';color:#9ca3af;
    }
    .thinking-chain .tc-caret{
      display:inline-block;width:1.5px;height:12px;
      background:#9ca3af;vertical-align:-2px;
      animation:tsblink 1s steps(2) infinite;
    }
    @keyframes tsblink{50%{opacity:0}}

    /* 时间线 */
    .tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .tl-line{width:2px;background:linear-gradient(to bottom,#FFD100,#FFC200);flex-shrink:0;margin:2px auto;}

    /* 标签 */
    .tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff3ec;color:#FFD100;}
    .tag-g{background:#ecfdf5;color:#059669;}
    .tag-b{background:#eff6ff;color:#3b82f6;}
    .tag-r{background:#fef2f2;color:#ef4444;}

    /* 按钮 */
    .btn-p{background:linear-gradient(135deg,#FFD100,#FFC200);color:#1a1200;border:none;border-radius:12px;padding:13px 24px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s;box-shadow:0 4px 15px rgba(255,209,0,.35);}
    .btn-p:active{transform:scale(.97);}
    .btn-p:disabled{opacity:.5;cursor:not-allowed;}
    .btn-s{background:white;color:#FFD100;border:1.5px solid #FFD100;border-radius:12px;padding:11px 24px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s;}
    .btn-s:active{transform:scale(.97);}

    /* 输入区 */
    .input-area{background:white;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.08);border:1.5px solid transparent;transition:border-color .2s;}
    .input-area:focus-within{border-color:#FFD100;}

    /* 示例芯片 */
    .chip{background:white;border:1px solid #e5e7eb;border-radius:20px;padding:4px 10px;font-size:12px;color:#374151;cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.05);}
    .chip:hover{border-color:#FFD100;color:#FFD100;}
    .chip:active{transform:scale(.96);}

    /* 表单行（图标标签 + 横向滑动 chips）*/
    .form-row{display:flex;flex-direction:column;gap:4px;padding:7px 12px 7px;}
    .form-row-label{font-size:11px;font-weight:700;color:#1f2937;white-space:nowrap;flex-shrink:0;width:46px;}
    .form-row-chips{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
    
    .form-row-chips .chip{padding:5px 6px;font-size:12px;background:#f3f4f6;border-color:#d1d5db;color:#111827;font-weight:600;box-shadow:none;text-align:center;width:100%;border-radius:10px;}
    .form-row-chips .chip:hover,.form-row-chips .chip.border-orange-400{border-color:#FFD100;color:#FFD100;background:#fff3ec;}

    /* ReAct 面板 */
    .react-panel{background:#1e1e2e;border-radius:12px;padding:12px;font-family:'SF Mono','Fira Code',monospace;font-size:11.5px;overflow:hidden;}
    .react-panel .ok{color:#4ade80;} .react-panel .warn{color:#fbbf24;} .react-panel .err{color:#f87171;}
    .react-panel .dim{color:#6b7280;} .react-panel .act{color:#60a5fa;} .react-panel .obs{color:#a78bfa;}
    .react-panel .reason{color:#e2e8f0;}

    /* 预订成功 */
    @keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
    .badge-pop{animation:pop .4s cubic-bezier(.175,.885,.32,1.275) forwards;}

    /* 分享卡 */
    .share-card{background:linear-gradient(135deg,#fff8f0,#fffdf0);border:1px solid #fde68a;border-radius:12px;}

    /* 礼品区 */
    .gift-item{border:1.5px solid #f3f4f6;border-radius:12px;padding:10px;cursor:pointer;transition:.15s;}
    .gift-item:hover{border-color:#FFD100;}
    .gift-item.selected{border-color:#FFD100;background:#fff3ec;}

    /* 滚动 */
    .chat-scroll{scroll-behavior:smooth;}
    ::-webkit-scrollbar{width:0;}

    /* 页面顶部栏 */
    .topbar{background:white;box-shadow:0 1px 0 #f0f0f0;}
    .app-brand-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:18px;background:rgba(28,28,30,.78);border:.5px solid rgba(255,255,255,.12);box-shadow:0 10px 28px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);}
    .app-brand-icon{width:36px;height:36px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(145deg,#FFD60A,#FFB800);box-shadow:0 8px 18px rgba(255,209,0,.32),inset 0 1px 0 rgba(255,255,255,.45);}
    .app-brand-icon svg{width:20px;height:20px;color:#fff;filter:drop-shadow(0 1px 1px rgba(0,0,0,.16));}
    .app-brand-copy{min-width:0;display:flex;flex-direction:column;gap:2px;}
    .app-brand-title{font-size:13px;font-weight:820;line-height:1.15;letter-spacing:-.2px;color:#F5F5F7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .app-brand-subtitle{display:inline-flex;align-items:center;gap:4px;width:max-content;max-width:100%;font-size:10px;line-height:1.2;color:rgba(235,235,245,.62);background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.08);border-radius:999px;padding:3px 7px;white-space:nowrap;}

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fadein{animation:fadeIn .3s ease forwards;}

    /* 行程进度追踪条 */
    .progress-track{background:#ffe8d6;border-radius:4px;height:6px;overflow:hidden;position:relative;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#FFD100,#FFC200);border-radius:4px;transition:width 1s linear;}
    .progress-dot{width:10px;height:10px;background:#FFD100;border-radius:50%;border:2px solid white;box-shadow:0 0 0 2px #FFD100;position:absolute;top:-2px;transform:translateX(-50%);transition:left 1s linear;}

    /* 槽位收集状态芯片 */
    .slot-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;background:#f3f4f6;color:#6b7280;}
    .slot-chip.filled{background:#ecfdf5;color:#059669;}
    .slot-chip.missing{background:#fef9c3;color:#b45309;}

    /* 群聊气泡 */
    @keyframes chatPop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .group-bubble{animation:chatPop .3s ease forwards;opacity:0;}
    .group-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}

    /* Plan A/B Tab */
    .plan-tab{display:flex;background:#f9fafb;border-bottom:1px solid #f0f0f0;}
    .plan-tab-btn{flex:1;padding:9px 0;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#9ca3af;transition:.2s;border-bottom:2px solid transparent;}
    .plan-tab-btn.active{color:#FFD100;background:white;border-bottom:2px solid #FFD100;}
    .plan-tab-pane{display:none;}
    .plan-tab-pane.active{display:block;}

    /* 推荐理由行 */
    .poi-reason{font-size:11px;color:#6b7280;margin-top:4px;padding:4px 8px;background:#f9fafb;border-radius:6px;line-height:1.5;}

    /* 视角切换开关 */
    .view-toggle{background:#f3f4f6;border-radius:20px;padding:3px;display:flex;gap:2px;}
    .view-toggle button{border:none;border-radius:16px;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;transition:.2s;background:transparent;color:#6b7280;}
    .view-toggle button.active{background:white;color:#FFD100;box-shadow:0 1px 4px rgba(0,0,0,.12);}

    /* ReAct面板隐藏态 */
    .react-panel-hidden{display:none !important;}

    /* 节假日/营业时间预警标签 */
    .holiday-warn{background:#fef2f2;color:#ef4444;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:3px;margin-top:4px;}

    /* ─── 美团风格 POI 卡片 ─── */
    .mt-poi-card{background:white;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);transition:.15s;cursor:pointer;margin-bottom:10px;}
    .mt-poi-card:active{transform:scale(.98);}
    .mt-cover{height:80px;display:flex;align-items:flex-end;justify-content:space-between;padding:8px;position:relative;}
    .mt-cover-cat{background:rgba(0,0,0,.38);color:white;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;backdrop-filter:blur(2px);}
    .mt-cover-time{background:rgba(255,209,0,.88);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
    .mt-body{padding:10px 12px 11px;}
    .mt-name{font-size:13px;font-weight:700;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;margin-bottom:4px;}
    .mt-row{display:flex;align-items:center;gap:5px;}
    .mt-rating{background:#FFD100;color:#1a1200;font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;flex-shrink:0;}
    .mt-reviews{font-size:11px;color:#9ca3af;}
    .mt-price{font-size:12px;font-weight:700;color:#FFD100;margin-left:auto;}
    .mt-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
    .mt-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#f3f4f6;color:#6b7280;}
    .mt-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
    .mt-dist{font-size:11px;color:#9ca3af;}
    .mt-btn{background:linear-gradient(135deg,#FFD100,#FFC200);color:#1a1200;border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
    .mt-transit-row{display:flex;align-items:center;gap:4px;padding:0 0 8px 22px;font-size:12px;color:#9ca3af;}
    .share-export-card{width:360px!important;max-width:360px!important;background:#fff!important;border:1px solid #f3f4f6!important;border-radius:18px!important;box-shadow:none!important;overflow:hidden!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif!important;}
    .share-export-card *{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;text-rendering:auto!important;letter-spacing:0!important;}
    .share-export-card .mt-poi-card{background:#fff!important;border:1px solid #f1f5f9!important;box-shadow:none!important;}
    .share-export-card .plan-best-header{background:#fff8e1!important;border-bottom:1px solid #fde68a!important;}
    .share-export-card .mt-transit-row{padding-left:28px!important;font-size:13px!important;line-height:1.5!important;}
    .share-export-card .plan-price-label{font-size:22px!important;max-width:108px!important;letter-spacing:-.5px!important;}
    /* 已替换/锁定标记 */
    .node-changed .mt-name::after{content:'← 已替换';font-size:10px;color:#FFD100;font-weight:500;margin-left:4px;}
    .node-locked .mt-name::after{content:'🔒 锁定';font-size:10px;color:#059669;font-weight:500;margin-left:4px;}

    /* ─── 执行清单 ─── */
    .exec-list{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);}
    .exec-header{padding:12px 16px 10px;border-bottom:1px solid #f3f4f6;font-size:13px;font-weight:700;color:#1f2937;display:flex;align-items:center;gap:6px;}
    .exec-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid #f3f4f6;position:relative;}
    .exec-item:last-child{border-bottom:none;}
    .exec-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .exec-info{flex:1;min-width:0;}
    .exec-name{font-size:13px;font-weight:700;color:#1f2937;margin-bottom:2px;}
    .exec-addr{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .exec-meta{font-size:11px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:6px;}
    .exec-open{color:#059669;font-weight:600;}
    .exec-nav{flex-shrink:0;background:#fff3ec;color:#FFD100;border:none;border-radius:20px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;align-self:center;}
    .exec-transit{display:flex;align-items:center;gap:6px;padding:4px 16px 4px 58px;font-size:11px;color:#9ca3af;border-bottom:1px solid #f3f4f6;}
    .exec-transit:last-child{border-bottom:none;}

    /* POI 元信息行（距离/时间/价格/评分） */
    .poi-meta{display:flex;gap:10px;font-size:10.5px;color:#9ca3af;margin-top:3px;flex-wrap:wrap;}
    .poi-meta span{display:inline-flex;align-items:center;gap:2px;}

    /* 快捷追问 chips */
    .followup-chip{background:#fff7ed;border:1px solid #fed7aa;border-radius:20px;padding:5px 12px;font-size:12px;color:#ea580c;cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:0 1px 3px rgba(234,88,12,.08);}
    .followup-chip:hover{background:#ffedd5;border-color:#fb923c;}
    .followup-chip:active{transform:scale(.96);}

    /* 深度思考开关按钮 */
    .deep-think-btn{border:1.5px solid #ddd6fe;border-radius:20px;padding:4px 10px;font-size:11px;color:#7c3aed;background:white;cursor:pointer;transition:.2s;font-weight:500;white-space:nowrap;}
    .deep-think-btn.active{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-color:#7c3aed;box-shadow:0 2px 8px rgba(124,58,237,.3);}

    /* 深度思考 think 块（嵌入 ReAct 面板内） */
    .think-block{background:#0f0f1a;border-left:2px solid #7c3aed;border-radius:0 6px 6px 0;margin:4px 0;}
    .think-block summary{color:#a78bfa;font-size:11px;font-weight:600;list-style:none;display:flex;align-items:center;gap:4px;padding:5px 8px;cursor:pointer;user-select:none;}
    .think-block summary::-webkit-details-marker{display:none;}
    .think-body{color:#c4b5fd;font-size:10px;line-height:1.75;padding:0 8px 6px;white-space:pre-wrap;opacity:.9;}

    /* ─── POI 详情底部弹窗（图1/图2风格）─── */
    #poiDetailOverlay{position:absolute;inset:0;background:rgba(0,0,0,.18);z-index:60;}
    .poi-detail-banner{height:180px;position:relative;overflow:hidden;}
    .poi-detail-banner-img{width:100%;height:100%;object-fit:cover;}
    .poi-detail-back{position:absolute;top:12px;left:12px;width:34px;height:34px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;font-size:16px;border:none;backdrop-filter:blur(4px);z-index:2;}
    .poi-detail-topicons{position:absolute;top:12px;right:12px;display:flex;gap:8px;}
    .poi-detail-topicon{width:34px;height:34px;background:rgba(0,0,0,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;backdrop-filter:blur(4px);border:none;cursor:pointer;}
    .poi-detail-live{position:absolute;bottom:10px;left:10px;background:rgba(255,0,0,.85);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:3px;}
    .poi-detail-body{padding:16px;}
    .poi-detail-name{font-size:20px;font-weight:800;color:#1f2937;display:flex;align-items:center;gap:6px;margin-bottom:6px;}
    .poi-detail-stats{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
    .poi-detail-rating{background:#FFD100;color:#1a1200;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
    .poi-detail-reviews{font-size:12px;color:#6b7280;}
    .poi-detail-price{font-size:13px;font-weight:700;color:#FFD100;margin-left:auto;}
    .poi-detail-badges{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
    .poi-detail-badge{background:#f9fafb;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
    .poi-detail-badge-icon{font-size:16px;}
    .poi-detail-badge-label{font-size:11px;color:#6b7280;}
    .poi-detail-badge-val{font-size:12px;font-weight:600;color:#1f2937;}
    .poi-detail-hours{font-size:13px;font-weight:600;color:#059669;margin:10px 0 8px;display:flex;align-items:center;gap:6px;}
    .poi-detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
    .poi-detail-tag{font-size:11px;background:#f3f4f6;color:#6b7280;padding:3px 10px;border-radius:20px;}
    .poi-detail-addr-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-top:1px solid #f3f4f6;border-bottom:1px solid #f3f4f6;margin:10px 0;}
    .poi-detail-addr-text{font-size:12px;color:#6b7280;flex:1;line-height:1.6;}
    .poi-detail-actions{display:flex;gap:10px;margin-top:4px;}
    .poi-detail-action-btn{flex:1;height:42px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;border:none;}
    .poi-detail-action-primary{background:linear-gradient(135deg,#FFD100,#FFC200);color:#1a1200;}
    .poi-detail-action-secondary{background:#f3f4f6;color:#374151;}
    .poi-detail-discount{background:#fff3ec;border-radius:12px;padding:12px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
    .poi-detail-discount-label{font-size:12px;color:#1f2937;font-weight:600;}
    .poi-detail-discount-sub{font-size:11px;color:#6b7280;margin-top:2px;}
    .poi-detail-discount-price{text-align:right;}
    .poi-detail-discount-orig{font-size:11px;color:#9ca3af;text-decoration:line-through;}
    .poi-detail-discount-now{font-size:16px;font-weight:800;color:#FFD100;}
    .poi-detail-buy-btn{background:linear-gradient(135deg,#FFD100,#FFC200);color:#1a1200;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
    .poi-detail-tabs{display:flex;border-bottom:1px solid #f0f0f0;margin-top:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .poi-detail-tabs::-webkit-scrollbar{display:none;}
    .poi-detail-tab{padding:10px 16px;font-size:13px;font-weight:600;color:#9ca3af;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;}
    .poi-detail-tab.active{color:#FFD100;border-bottom-color:#FFD100;}
    .poi-detail-section-title{font-size:14px;font-weight:700;color:#1f2937;margin:14px 0 8px;}

    /* ─── 执行清单增强（图3风格）─── */
    .exec-item-v2{display:flex;align-items:stretch;gap:0;padding:0;border-bottom:1px solid #f3f4f6;}
    .exec-item-v2:last-child{border-bottom:none;}
    .exec-icon-col{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:14px 0 0;}
    .exec-icon-box{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .exec-line{width:2px;flex:1;background:linear-gradient(to bottom,#e5e7eb,transparent);margin-top:6px;min-height:24px;}
    .exec-content{flex:1;padding:14px 14px 14px 0;}
    .exec-name-v2{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:3px;}
    .exec-addr-v2{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
    .exec-open-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;}
    .exec-open-badge.open{color:#FFD100;}
    .exec-open-badge.closed{color:#6b7280;}
    .exec-desc{font-size:11px;color:#9ca3af;margin-top:4px;line-height:1.5;}
    .exec-dist-row{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;padding:6px 14px 6px 56px;border-bottom:1px solid #f3f4f6;}
    .exec-dist-row:last-child{border-bottom:none;}
    .exec-nav-v2{flex-shrink:0;background:#fff3ec;color:#FFD100;border:none;border-radius:20px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;align-self:center;margin-right:14px;margin-left:4px;}

    /* ═══════════════════════════════════════════
       iOS Dark Mode Theme  ─  Apple-native style
       Inspired by iOS Camera + Apple Education
    ═══════════════════════════════════════════ */

    /* ── 基础层次色 ── */
    :root {
      --ios-bg:           #000000;
      --ios-surface1:     #1c1c1e;
      --ios-surface2:     #2c2c2e;
      --ios-surface3:     #3a3a3c;
      --ios-fill:         rgba(120,120,128,0.18);
      --ios-label:        #ffffff;
      --ios-label2:       rgba(235,235,245,0.60);
      --ios-label3:       rgba(235,235,245,0.30);
      --ios-sep:          rgba(84,84,88,0.55);
      --ios-accent:       #FFD100;
      /* ── Liquid Glass tokens ── */
      --ios-glass:        rgba(28,28,30,0.72);
      --ios-glass-strong: rgba(18,18,20,0.88);
      --ios-glass-border: rgba(255,255,255,0.12);
      --ios-glass-blur:   blur(22px) saturate(180%);
      --ios-glass-inset:  inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* ── 聊天区背景 ── */
    #chatArea {
      background: var(--ios-bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,209,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,194,0,0.08) 0%, transparent 55%);
    }

    /* ── AI 气泡 → Liquid Glass ── */
    .bubble-ai {
      background: var(--ios-glass) !important;
      backdrop-filter: var(--ios-glass-blur);
      -webkit-backdrop-filter: var(--ios-glass-blur);
      border: 0.5px solid var(--ios-glass-border);
      box-shadow: 0 4px 24px rgba(0,0,0,.45), var(--ios-glass-inset);
      color: var(--ios-label);
    }
    .bubble-ai .text-gray-800, .bubble-ai .text-gray-700, .bubble-ai .text-gray-600 { color: var(--ios-label) !important; }
    .bubble-ai .text-gray-500, .bubble-ai .text-gray-400 { color: var(--ios-label2) !important; }
    /* ── 顶部栏 → Liquid Glass ── */
    .topbar {
      background: rgba(0,0,0,.55) !important;
      backdrop-filter: var(--ios-glass-blur) !important;
      -webkit-backdrop-filter: var(--ios-glass-blur) !important;
      box-shadow: 0 0.5px 0 var(--ios-glass-border) !important;
    }
    #topbarSubtitle { color: var(--ios-label2) !important; }
    .topbar .font-semibold { color: var(--ios-label) !important; }

    /* ── 输入区 → Liquid Glass ── */
    .input-area {
      background: var(--ios-glass) !important;
      backdrop-filter: var(--ios-glass-blur) !important;
      -webkit-backdrop-filter: var(--ios-glass-blur) !important;
      border: 0.5px solid var(--ios-glass-border) !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.5), var(--ios-glass-inset) !important;
    }
    .input-area:focus-within { border-color: var(--ios-accent) !important; }
    #userInput { color: var(--ios-label) !important; }
    #userInput::placeholder { color: var(--ios-label3) !important; }
    .input-area + div, .flex.items-center.gap-2.mb-1\.5 { background: transparent; }

    /* ── 快捷 chip ── */
    .chip {
      background: rgba(44,44,46,0.72) !important;
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 0.5px solid var(--ios-glass-border) !important;
      color: var(--ios-label2) !important;
    }
    .chip:hover { border-color: var(--ios-accent) !important; color: var(--ios-accent) !important; }

    /* ── 方案卡片 → Liquid Glass ── */
    .plan-card {
      background: var(--ios-glass) !important;
      backdrop-filter: var(--ios-glass-blur);
      -webkit-backdrop-filter: var(--ios-glass-blur);
      border: 0.5px solid var(--ios-glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,.55), var(--ios-glass-inset) !important;
    }

    /* ── POI 卡片 → Liquid Glass ── */
    .mt-poi-card {
      background: var(--ios-glass) !important;
      backdrop-filter: var(--ios-glass-blur);
      -webkit-backdrop-filter: var(--ios-glass-blur);
      border: 0.5px solid var(--ios-glass-border);
      box-shadow: 0 4px 20px rgba(0,0,0,.5), var(--ios-glass-inset) !important;
    }
    .mt-name { color: var(--ios-label) !important; }
    .mt-reviews { color: var(--ios-label3) !important; }
    .mt-tag { background: rgba(58,58,60,0.72) !important; color: var(--ios-label2) !important; }
    .mt-transit-row { color: var(--ios-label3) !important; }
    .mt-dist { color: var(--ios-label3) !important; }

    /* ── 思考链面板 → Liquid Glass ── */
    .thinking-chain summary {
      background: rgba(44,44,46,0.72) !important;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 0.5px solid rgba(255,194,0,.28) !important;
      color: rgba(235,235,245,.85) !important;
    }
    .thinking-chain details[open] summary { border-bottom-color: rgba(255,194,0,.15) !important; }
    .thinking-chain summary:hover { background: rgba(58,58,60,.82) !important; }
    .thinking-chain .tc-body {
      background: rgba(16,16,20,.88) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid rgba(255,194,0,.15) !important;
      border-top: none !important;
      color: rgba(235,235,245,.7) !important;
    }
    .thinking-chain .tc-spin { border-color: rgba(255,194,0,.25) !important; border-top-color: #FFC200 !important; }
    .thinking-chain .tc-body:empty::before { color: var(--ios-label3) !important; }

    /* ── 时间线 ── */
    .tl-line { background: linear-gradient(to bottom,#FFD100,#FFC200) !important; }

    /* ── 标签 ── */
    .tag { background: rgba(255,209,0,.18) !important; color: #FFC200 !important; }
    .tag-g { background: rgba(52,199,89,.15) !important; color: #30d158 !important; }
    .tag-b { background: rgba(10,132,255,.15) !important; color: #0a84ff !important; }
    .tag-r { background: rgba(255,69,58,.15) !important; color: #ff453a !important; }

    /* ── 按钮 ── */
    .btn-s {
      background: var(--ios-surface2) !important;
      border-color: var(--ios-accent) !important;
      color: var(--ios-accent) !important;
    }

    /* ── 表单行（向导） ── */
    .form-row { background: transparent; border-bottom: 1px solid var(--ios-sep); }
    .form-row-label { color: var(--ios-label) !important; }
    .form-row-chips .chip { background: var(--ios-surface3) !important; border-color: var(--ios-sep) !important; color: var(--ios-label2) !important; }
    .form-row-chips .chip:hover,
    .form-row-chips .chip.border-orange-400 { border-color: var(--ios-accent) !important; color: var(--ios-accent) !important; background: rgba(255,209,0,.12) !important; }

    /* ── 向导卡片容器 ── */
    .bubble-ai > div[style*="background:white"],
    div[style*="background:white"][style*="border-radius:18px"],
    div[style*="background:white;border-radius:18px"] {
      background: var(--ios-surface1) !important;
    }
    /* 向导标题行 */
    div[style*="background:linear-gradient(135deg,#fff3ec"] {
      background: linear-gradient(135deg,rgba(44,44,46,.95),rgba(38,38,40,.95)) !important;
      border-bottom-color: var(--ios-sep) !important;
    }
    div[style*="color:#1f2937"] { color: var(--ios-label) !important; }
    div[style*="color:#6b7280"] { color: var(--ios-label2) !important; }
    span[style*="color:#6b7280"] { color: var(--ios-label2) !important; }
    span[style*="color:#1f2937"] { color: var(--ios-label) !important; }
    p[style*="color:#1f2937"] { color: var(--ios-label) !important; }
    p[style*="color:#6b7280"] { color: var(--ios-label2) !important; }

    /* ── 向导 chip 选中态（深色模式覆盖 Tailwind 橙色类）── */
    #iphoneScreen .chip.border-orange-400,
    #iphoneScreen .chip.bg-orange-50 {
      background: rgba(255,209,0,0.18) !important;
      border-color: var(--ios-accent) !important;
      color: #FFC200 !important;
    }
    body.light-mode #iphoneScreen .chip.border-orange-400,
    body.light-mode #iphoneScreen .chip.bg-orange-50 {
      background: #fff3ec !important;
      border-color: #FFD100 !important;
      color: #FFD100 !important;
    }

    /* ── 追问 chips ── */
    .followup-chip {
      background: rgba(255,209,0,.12) !important;
      border-color: rgba(255,209,0,.3) !important;
      color: #FFC200 !important;
    }
    .followup-chip:hover { background: rgba(255,209,0,.2) !important; }

    /* ── 深度思考按钮 ── */
    .deep-think-btn { background: var(--ios-surface2) !important; border-color: rgba(124,58,237,.5) !important; color: #bf5af2 !important; }
    .deep-think-btn.active { background: linear-gradient(135deg,#6c28d9,#a855f7) !important; color: #fff !important; border-color: #7c3aed !important; }

    /* ── plan tab ── */
    .plan-tab { background: var(--ios-surface2) !important; border-bottom-color: var(--ios-sep) !important; }
    .plan-tab-btn { color: var(--ios-label3) !important; }
    .plan-tab-btn.active { color: var(--ios-accent) !important; background: var(--ios-surface1) !important; border-bottom-color: var(--ios-accent) !important; }
    /* 最佳推荐方案头部 */
    .plan-best-header { background: rgba(255,209,0,.12); border-bottom: 1px solid rgba(255,209,0,.2); }

    /* ── 执行清单 → Liquid Glass ── */
    .exec-list {
      background: var(--ios-glass) !important;
      backdrop-filter: var(--ios-glass-blur);
      -webkit-backdrop-filter: var(--ios-glass-blur);
      border: 0.5px solid var(--ios-glass-border);
      box-shadow: 0 4px 24px rgba(0,0,0,.5), var(--ios-glass-inset) !important;
    }
    .exec-header { border-bottom-color: var(--ios-sep) !important; color: var(--ios-label) !important; }
    .exec-item, .exec-item-v2 { border-bottom-color: var(--ios-sep) !important; }
    .exec-name, .exec-name-v2 { color: var(--ios-label) !important; }
    .exec-addr, .exec-addr-v2 { color: var(--ios-label3) !important; }
    .exec-meta { color: var(--ios-label2) !important; }
    .exec-nav, .exec-nav-v2 { background: rgba(255,209,0,.15) !important; color: #FFC200 !important; }
    .exec-dist-row { color: var(--ios-label2) !important; border-bottom-color: var(--ios-sep) !important; }
    .exec-line { background: linear-gradient(to bottom,var(--ios-sep),transparent) !important; }

    /* ── poi 推荐理由 ── */
    .poi-reason { background: var(--ios-surface2) !important; color: var(--ios-label2) !important; }

    /* ── slot chip ── */
    .slot-chip { background: var(--ios-surface2) !important; color: var(--ios-label2) !important; }
    .slot-chip.filled { background: rgba(52,199,89,.15) !important; color: #30d158 !important; }
    .slot-chip.missing { background: rgba(255,214,10,.12) !important; color: #ffd60a !important; }

    /* ── holiday warn ── */
    .holiday-warn { background: rgba(255,69,58,.15) !important; color: #ff453a !important; }

    /* ── 分享卡 ── */
    .share-card { background: rgba(44,44,46,.9) !important; border-color: rgba(255,214,10,.2) !important; }

    /* ── progress ── */
    .progress-track { background: var(--ios-surface3) !important; }

    /* ── 群聊气泡 ── */
    .group-avatar { background: var(--ios-surface2) !important; color: var(--ios-label) !important; }

    /* ── POI 详情 sheet → Liquid Glass ── */
    #poiDetailSheet {
      background: var(--ios-glass-strong) !important;
      backdrop-filter: var(--ios-glass-blur) !important;
      -webkit-backdrop-filter: var(--ios-glass-blur) !important;
      border-top: 0.5px solid var(--ios-glass-border) !important;
    }
    .poi-detail-name { color: var(--ios-label) !important; }
    .poi-detail-reviews { color: var(--ios-label3) !important; }
    .poi-detail-price { color: var(--ios-accent) !important; }
    .poi-detail-badge { background: var(--ios-surface2) !important; }
    .poi-detail-badge-label { color: var(--ios-label3) !important; }
    .poi-detail-badge-val { color: var(--ios-label) !important; }
    .poi-detail-hours { color: #30d158 !important; }
    .poi-detail-tag { background: var(--ios-surface2) !important; color: var(--ios-label2) !important; }
    .poi-detail-addr-row { border-color: var(--ios-sep) !important; }
    .poi-detail-addr-text { color: var(--ios-label2) !important; }
    .poi-detail-action-secondary { background: var(--ios-surface3) !important; color: var(--ios-label) !important; }
    .poi-detail-discount { background: rgba(255,209,0,.12) !important; }
    .poi-detail-discount-label { color: var(--ios-label) !important; }
    .poi-detail-discount-sub { color: var(--ios-label2) !important; }
    .poi-detail-tabs { border-bottom-color: var(--ios-sep) !important; }
    .poi-detail-tab { color: var(--ios-label3) !important; }
    .poi-detail-tab.active { color: var(--ios-accent) !important; border-bottom-color: var(--ios-accent) !important; }
    .poi-detail-section-title { color: var(--ios-label) !important; }
    .poi-detail-back, .poi-detail-topicon { background: rgba(28,28,30,.7) !important; backdrop-filter:blur(10px); }
    /* 新版详情页 inline 元素 dark 覆盖 */
    #poiDetailContent [style*="background:#f9fafb"],
    #poiDetailContent [style*="background:#f3f4f6"] { background: var(--ios-surface2) !important; }
    #poiDetailContent [style*="color:#1f2937"],
    #poiDetailContent [style*="color:#374151"] { color: var(--ios-label) !important; }
    #poiDetailContent [style*="color:#6b7280"] { color: var(--ios-label2) !important; }
    #poiDetailContent [style*="color:#9ca3af"] { color: var(--ios-label3) !important; }
    #poiDetailContent [style*="border-top:1px solid #f3f4f6"],
    #poiDetailContent [style*="border-bottom:1px solid #f3f4f6"],
    #poiDetailContent [style*="border:1px solid #f0f0f0"] { border-color: var(--ios-sep) !important; }
    #poiDetailContent [style*="background:#fff7f3"] { background: rgba(255,209,0,.12) !important; }
    #poiDetailContent [style*="background:#fff8f6"] { background: rgba(255,209,0,.08) !important; }

    /* ── 视角切换 ── */
    .view-toggle { background: var(--ios-surface2) !important; }
    .view-toggle button { color: var(--ios-label2) !important; }
    .view-toggle button.active { background: var(--ios-surface3) !important; color: var(--ios-accent) !important; box-shadow: 0 1px 4px rgba(0,0,0,.5) !important; }

    /* ── 控制栏侧边面板 ── */
    #apiConfigPanel { background: var(--ios-surface1) !important; border-color: var(--ios-sep) !important; }
    #apiConfigPanel input { background: var(--ios-surface2) !important; border-color: var(--ios-sep) !important; color: var(--ios-label) !important; }
    #apiTestResult { color: var(--ios-label2) !important; }

    /* ── 全局文字颜色兜底 ── */
    #iphoneScreen .text-gray-800 { color: rgba(235,235,245,.9) !important; }
    #iphoneScreen .text-gray-700 { color: rgba(235,235,245,.85) !important; }
    #iphoneScreen .text-gray-600 { color: rgba(235,235,245,.7) !important; }
    #iphoneScreen .text-gray-500 { color: rgba(235,235,245,.55) !important; }
    #iphoneScreen .text-gray-400 { color: rgba(235,235,245,.38) !important; }
    #iphoneScreen .text-gray-300 { color: rgba(235,235,245,.22) !important; }
    #iphoneScreen .border-gray-100 { border-color: var(--ios-sep) !important; }
    #iphoneScreen .border-gray-200 { border-color: var(--ios-sep) !important; }
    #iphoneScreen .bg-gray-50,
    #iphoneScreen .bg-gray-100,
    #iphoneScreen .bg-white { background: var(--ios-surface1) !important; }
    #iphoneScreen .bg-gray-200 { background: var(--ios-surface2) !important; }

    #iphoneScreen .bg-gray-200 { background: var(--ios-surface2) !important; }

    /* ══ 日间模式 (body.light-mode) ══ */
    body.light-mode {
      --ios-bg:           #f0f2f5;
      --ios-surface1:     #ffffff;
      --ios-surface2:     #f3f4f6;
      --ios-surface3:     #e5e7eb;
      --ios-fill:         rgba(0,0,0,0.05);
      --ios-label:        #1f2937;
      --ios-label2:       #6b7280;
      --ios-label3:       #9ca3af;
      --ios-sep:          rgba(0,0,0,0.10);
      --ios-glass:        rgba(255,255,255,0.72);
      --ios-glass-strong: rgba(255,255,255,0.88);
      --ios-glass-border: rgba(0,0,0,0.08);
      --ios-glass-inset:  inset 0 1px 0 rgba(255,255,255,0.9);
    }
    body.light-mode {
      background: #f0f2f5 !important;
      background-image:
        radial-gradient(ellipse 100% 80% at 15% 5%, rgba(255,209,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 85% 90%, rgba(255,194,0,0.08) 0%, transparent 50%) !important;
    }
    body.light-mode #iphoneScreen {
      background: #f0f2f5 !important;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,209,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,194,0,0.06) 0%, transparent 55%) !important;
    }
    body.light-mode #chatArea {
      background: transparent !important;
      background-image: none !important;
    }
    body.light-mode .bubble-ai {
      background: rgba(255,255,255,0.72) !important;
      backdrop-filter: var(--ios-glass-blur) !important;
      -webkit-backdrop-filter: var(--ios-glass-blur) !important;
      border: 0.5px solid rgba(0,0,0,0.08) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.9) !important;
      color: #1f2937 !important;
    }
    body.light-mode .bubble-ai .text-gray-800 { color: #1f2937 !important; }

const POI_DETAIL_STORE = {};

function storePoi(poi, catEmoji, catLabel, grad) {
  const key = 'poi_' + (++_poiDetailId);
  POI_DETAIL_STORE[key] = { ...poi, catEmoji, catLabel, grad };
  return key;
}

function escapeHtml(t) { return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function calcTime(base, addH) {
  const [h,m] = base.split(":").map(Number);
  const tot = h*60 + m + Math.round(addH*60);
  const rounded = Math.round(tot/10)*10;
  return `${String(Math.floor(rounded/60)%24).padStart(2,"0")}:${String(rounded%60).padStart(2,"0")}`;
}
function normalizeLngLat(value) {
  if (!value) return null;
  if (Array.isArray(value)) return { lng: Number(value[0]), lat: Number(value[1]) };
  if (typeof value === 'string' && value.includes(',')) {
    const [lng, lat] = value.split(',').map(Number);
    return { lng, lat };
  }
  if (value.lng != null && value.lat != null) return { lng: Number(value.lng), lat: Number(value.lat) };
  return null;
}
function distanceKmBetween(a, b) {
  if (!a || !b || !Number.isFinite(a.lng) || !Number.isFinite(a.lat) || !Number.isFinite(b.lng) || !Number.isFinite(b.lat)) return null;
  const rad = Math.PI / 180;
  const dLat = (b.lat - a.lat) * rad;
  const dLng = (b.lng - a.lng) * rad;
  const s = Math.sin(dLat/2) ** 2 + Math.cos(a.lat*rad) * Math.cos(b.lat*rad) * Math.sin(dLng/2) ** 2;
  return +(6371 * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s))).toFixed(1);
}
function commuteMinutes(distanceKm) {
  const d = Number(distanceKm);
  if (!Number.isFinite(d)) return 15;
  if (d <= 2) return Math.max(3, Math.round(d * 12));
  if (d <= 30) return Math.round(d * 4 + 5);
  return Math.round(d * 1.8 + 25);
}

// 通用 LLM 调用（OpenAI-compatible）
async function callLLM(messages, maxTokens = 512, timeoutMs = 10000) {
  if (!llmAppKey) return null;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(LLM_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${llmAppKey}`
      },
      body: JSON.stringify({ model: LLM_MODEL, messages, max_tokens: maxTokens }),
      signal: controller.signal
    });
    clearTimeout(timer);
    if (!resp.ok) return null;
    const data = await resp.json();
    const msg = data.choices?.[0]?.message;
    let out = msg?.content?.trim() || msg?.reasoning_content?.trim() || '';
    // 剥离 <think>...</think> 以及 markdown 冗余
    out = out.replace(/<think>[\s\S]*?<\/think>\s*/gi, '').trim();
    return out || null;
  } catch { clearTimeout(timer); return null; }
}

// 带思维链的 LLM 调用，返回 { thinking, content }
// MiniMax 在 content 里用 <think>...</think> 包裹推理
async function callLLMWithThinking(messages, maxTokens = 800, timeoutMs = 20000) {
  if (!llmAppKey) return { thinking: '', content: '' };
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(LLM_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${llmAppKey}` },
      body: JSON.stringify({ model: LLM_MODEL, messages, max_tokens: maxTokens }),
      signal: controller.signal
    });
    clearTimeout(timer);
    if (!resp.ok) return { thinking: '', content: '' };
    const data = await resp.json();
    const msg = data.choices?.[0]?.message || {};
    // 优先从 reasoning_content 字段取（Kimi-K2.6）
    let thinking = msg.reasoning_content?.trim() || '';
    let content  = msg.content?.trim() || '';
    // MiniMax 把思维链放在 <think>...</think> 标签里
    if (!thinking && content) {
      const m = content.match(/<think>([\s\S]*?)<\/think>\s*([\s\S]*)/);
      if (m) { thinking = m[1].trim(); content = m[2].trim(); }
    }
    return { thinking, content };
  } catch { clearTimeout(timer); return { thinking: '', content: '' }; }
}

// ──────────────────────────────────────────────
// SSE 流式 LLM —— 返回 AsyncGenerator<{type:'think'|'content', text:string}>
// ──────────────────────────────────────────────
async function* streamLLM(messages, maxTokens = 1200) {
  if (!llmAppKey) return;
  try {
    const resp = await fetch(LLM_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${llmAppKey}` },
      body: JSON.stringify({
        model: LLM_MODEL,
        messages,
        max_tokens: maxTokens,
        stream: true
      })
    });
    if (!resp.ok || !resp.body) return;
    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let inThink = false;       // 追踪是否在 <think> 块内
    let hasReasoning = false;  // 是否收到过 reasoning_content（思维链模型标志）

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();  // 保留未完成的行

      for (const line of lines) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        try {
          const data  = JSON.parse(line.slice(6));
          const delta = data.choices?.[0]?.delta;
          if (!delta) continue;

          // reasoning_content 字段（Kimi 等思维链模型）
          if (delta.reasoning_content) {
            hasReasoning = true;
            yield { type: 'think', text: delta.reasoning_content };
            continue;
          }
          // tool_calls：Kimi 正在调用 $web_search，展示搜索关键词
          if (delta.tool_calls?.length) {
            const tc = delta.tool_calls[0];
            const args = tc.function?.arguments || '';
            // 逐步拼接 arguments JSON，遇到完整 query 就提示
            if (args) {
              try {
                const parsed = JSON.parse(args);
                if (parsed.query) {
                  yield { type: 'tool', text: parsed.query };
                }
              } catch { /* args still streaming */ }
            }
            continue;
          }
          // content 字段：MiniMax 把 <think> 内联在 content 里；
          // 对于无 reasoning_content 的模型（如 GLM-4-Flash），直接作为思维链显示
          let chunk = delta.content || '';
          if (!chunk) continue;

          // 非思维链模型：全部内容作为 think 显示在思维链面板
          if (!hasReasoning) {
            yield { type: 'think', text: chunk };
            continue;
          }

          // 拆分 <think> / </think> 标签（MiniMax 等模型）
          while (chunk) {
            if (inThink) {
              const end = chunk.indexOf('</think>');
              if (end === -1) {
                yield { type: 'think', text: chunk };
                chunk = '';
              } else {
                if (end > 0) yield { type: 'think', text: chunk.slice(0, end) };
                inThink = false;
                chunk = chunk.slice(end + 8);
              }
            } else {
              const start = chunk.indexOf('<think>');
              if (start === -1) {
                yield { type: 'content', text: chunk };
                chunk = '';
              } else {
                if (start > 0) yield { type: 'content', text: chunk.slice(0, start) };
                inThink = true;
                chunk = chunk.slice(start + 7);
              }
            }
          }
        } catch { /* ignore malformed chunk */ }
      }
    }
  } catch { /* stream error */ }
}

// 开启思维链面板并流式写入（与工具调用并行运行）
// 返回 Promise，调用方可 await 等待完成或 race
function mountStreamingThinkingChain(messages, maxTokens = 1200) {
  // 1. 立即挂载面板
  const bubble = appendBubble(`
    <div class="thinking-chain">
      <details open>
        <summary>
          <span class="tc-spin"></span>
          <span>Thinking</span>
          <span class="tc-chevron">▼</span>
        </summary>
        <div class="tc-body"></div>
      </details>
    </div>
  `);
  const details  = bubble.querySelector('details');
  const tcBody   = bubble.querySelector('.tc-body');
  const tcSpin   = bubble.querySelector('.tc-spin');
  let   summary  = '';

  // 2. 异步流式写入，返回 Promise{summary}
  const promise = (async () => {
    let thinkBuf = '';
    let contentBuf = '';

    for await (const { type, text } of streamLLM(messages, maxTokens)) {
      if (type === 'think') {
        thinkBuf += text;
        tcBody.textContent = thinkBuf;
        tcBody.scrollTop = tcBody.scrollHeight;
        scrollBottomStream();
      } else if (type === 'tool') {
        // Kimi 调用 $web_search，在思维链末尾追加搜索提示
        thinkBuf += `\n\n🔍 联网搜索：${text}\n`;
        tcBody.textContent = thinkBuf;
        tcBody.scrollTop = tcBody.scrollHeight;
        scrollBottomStream();
      } else {
        contentBuf += text;
      }
    }

    // 推理完成
    tcSpin.className   = 'tc-check';
    tcSpin.textContent = '✓';
    // 用户视角保持展开，技术视角自动折叠
    if (viewMode === 'tech') {
      await sleep(350);
      details.open = false;
    }

    summary = contentBuf.trim() ||
      thinkBuf.trim().split(/[。！？\n]/).filter(s => s.trim()).slice(0, 2).join('，').trim();
    if (summary && !/[。！？]$/.test(summary)) summary += '。';
    return summary;
  })();

  return { promise, bubble };
}

// LLM 意图提取（降级到 regex parseIntent）
async function parseIntentWithLLM(text) {
  const regexResult = parseIntent(text);
  if (!llmAppKey) return regexResult;

  const systemPrompt = `你是周末出行规划助手，从用户消息中提取出行意图。
只返回JSON，字段：
- groupType: "亲子"|"朋友"|"情侣"|"宠物"（默认"朋友"）
- partySize: 数字（默认2）
- hasChild: true/false
- childAge: 数字或null
- onDiet: true/false（是否有减肥/轻食需求）
- hasPet: true/false
- maxBudget: 数字或null（人均预算上限）
- transport: "taxi"|"metro"|"drive"（默认"taxi"）
- intensity: "low"|"medium"|"high"（步行强度，默认"medium"）
- rejection: "price"|"cuisine"|"activity"|null（是否在换方案）
只返回JSON，不要解释。`;
  try {
    const raw = await callLLM([
      { role: 'system', content: systemPrompt },
      { role: 'user',   content: text }
    ], 256);
    if (!raw) return regexResult;
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    // 合并，LLM结果为主，保留 regex 兜底字段
    return inheritCurrentPlanContext({ ...regexResult, ...parsed, startTime: regexResult.startTime, durationH: regexResult.durationH, maxDist: regexResult.maxDist, targetDate: regexResult.targetDate, dateLabel: regexResult.dateLabel, weatherLabel: regexResult.weatherLabel, dateReason: regexResult.dateReason }, text);
  } catch { return regexResult; }
}

// LLM 真正决策：从候选 POI 中选出最佳活动 + 餐厅组合
async function selectWithLLM(acts, rsts, intent, weather) {
  if (!llmAppKey || !acts.length || !rsts.length) return null;

  const actsList = acts.slice(0, 6).map((a, i) => ({
    序号: i, 名称: a.name,
    评分: a.rating ?? '未知', 距离: `${a.dist ?? '?'}km`,
    价格: a.price ? `¥${a.price}/人` : '未知',
    标签: a.tags?.join('、') || '', 地址: a.address ?? '',
  }));
  const rstsList = rsts.slice(0, 6).map((r, i) => ({
    序号: i, 名称: r.name, 菜系: r.cuisine ?? '综合',
    人均: r.price ? `¥${r.price}` : '未知', 距离: `${r.dist ?? '?'}km`,
    儿童友好: r.childFriendly ?? false,
    低卡选项: (r.diet?.length ?? 0) > 0,
    等位: r.hasWait ? `约${r.waitCount * 4}分钟` : '无',
  }));

  const systemPrompt = `你是美团智能规划引擎，从候选POI中选出最优活动+餐厅组合。

选择规则（按优先级）：
1. 硬约束（必须满足）：带娃→儿童友好=true；带宠物→宠物友好=true；减肥→有低卡选项；有预算上限→人均≤上限
2. 天气适配：下雨/高温→优先室内/有遮蔽场所
3. 综合排序：半日/下午方案距离优先级高于评分；优先选择 8km 内地点，除非近处完全不可用
4. 组合逻辑：活动与餐厅地理距离尽量近；半日方案餐厅尽量在活动 3km 内，步行强度=low优先选近距离场所

输出格式（严格遵守，只输出这一行JSON，不要任何分析说明）：
{"actIndex":1,"rstIndex":0,"reason":"活动评分高且儿童友好，餐厅有低卡选项符合减肥需求"}

现在根据用户需求输出选择结果：`;

  const userMsg = JSON.stringify({
    用户画像: {
      场景: intent.groupType, 人数: intent.partySize,
      带娃: intent.hasChild ? `是（${intent.childAge||5}岁）` : '否',
      带宠物: intent.hasPet, 减肥需求: intent.onDiet,
      预算上限: intent.maxBudget ? `¥${intent.maxBudget}/人` : '不限',
      交通方式: intent.transport, 步行强度: intent.intensity,
      最远可接受距离: `${intent.maxDist}km`,
      优先距离: `${getPreferredDistanceLimit(intent)}km内优先，半日方案不要为了评分去很远`, 
    },
    天气状况: weather?.desc ?? '未知',
    是否下雨: weather?.isRainy ?? false,
    候选活动: actsList,
    候选餐厅: rstsList,
  }, null, 2);

  try {
    const raw = await callLLM([
      { role: 'system', content: systemPrompt },
      { role: 'user',   content: userMsg }
    ], 3000, 20000);
    if (!raw) return null;
    // 先尝试直接解析，再尝试从推理文字中提取 JSON（推理模型会把所有内容放到 reasoning_content）
    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      const m = raw.match(/\{[^{}]*"actIndex"\s*:\s*\d+[^{}]*\}/);
      if (!m) return null;
      parsed = JSON.parse(m[0]);
    }
    return {
      actIndex: Math.min(Math.max(parsed.actIndex ?? 0, 0), acts.length - 1),
      rstIndex: Math.min(Math.max(parsed.rstIndex ?? 0, 0), rsts.length - 1),
      reason:   parsed.reason || '',
    };
  } catch { return null; }
}

// JSONP 请求（绕过 CORS，高德 REST API 支持 callback 参数）
function amapJsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_amap_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cbName] = (data) => {
      delete window[cbName];
      script.parentNode && script.parentNode.removeChild(script);
      resolve(data);
    };
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + `callback=${cbName}`;
    script.onerror = () => {
      delete window[cbName];
      script.parentNode && script.parentNode.removeChild(script);
      reject(new Error('JSONP failed'));
    };
    document.head.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        script.parentNode && script.parentNode.removeChild(script);
        reject(new Error('JSONP timeout'));
      }
    }, 8000);
  });
}

// IP 定位兜底（ipapi.co，无需 Key，HTTPS，支持 file:// 场景）
async function fetchLocationByIP() {
  try {
    const data = await fetch('https://ipapi.co/json/').then(r => r.json());
    if (data.latitude) {
      return {
        lat: data.latitude,
        lng: data.longitude,
        city: data.city || '当前城市',
        district: data.region || '当前区域',
        address: `${data.city || ''}${data.region || ''}`,
        byIP: true
      };
    }
  } catch(e) {}
  return { lat: 39.9042, lng: 116.4074, city: '北京', district: '朝阳区', failed: true };
}

// 获取用户定位（浏览器 GPS → 高德逆地理编码；失败时 → IP 定位）
async function fetchLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) {
      fetchLocationByIP().then(resolve);
      return;
    }
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      try {
        const url = `https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}&location=${lng},${lat}&output=json`;
        const data = await amapJsonp(url);
        const comp = data.regeocode?.addressComponent || {};
        resolve({
          lat, lng,
          city: comp.city || comp.province || '北京',
          district: comp.district || '朝阳区',
          address: data.regeocode?.formatted_address || `${comp.district}`
        });
      } catch(e) {
        resolve({ lat, lng, city: '当前城市', district: '当前区域' });
      }
    }, () => {
      // GPS 被拒绝（file:// 协议 / 用户拒绝）→ IP 定位兜底
      fetchLocationByIP().then(resolve);
    }, { timeout: 5000 });
  });
}

// 高德 JS API 按需加载（避免阻塞页面）
let amapLoaded = false;
let amapLoading = null;
function loadAmapSdk() {
  if (amapLoaded) return Promise.resolve();
  if (amapLoading) return amapLoading;
  amapLoading = new Promise((resolve, reject) => {
    window._AMapSecurityConfig = { securityJsCode: '8f0f1426d7b6ef59617fd0b53cfc8918' };
    const script = document.createElement('script');
    script.src = 'https://webapi.amap.com/maps?v=2.0&key=d596c583562a095e844a706dd88aa7b3&plugin=AMap.PlaceSearch';

// 高德 POI 搜索：城市级搜索用于周末跨城/远郊，不受周边半径限制
async function searchAmapPOI(lat, lng, keywords, types, city = '') {
  try {
    await loadAmapSdk();
    const runSearch = (query, typeFilter = types, cityName = city) => new Promise(resolve => {
      const placeSearch = new AMap.PlaceSearch({ pageSize: 20, pageIndex: 1, city: cityName || undefined, citylimit: false, type: typeFilter || undefined });
      placeSearch.search(query, (status, result) => {
        if (status === 'complete' && result.poiList?.pois?.length) {
          resolve(result.poiList.pois.map(poi => {
            const point = normalizeLngLat(poi.location);
            if (point) {
              poi.location = point;
              poi.distance = Math.round((distanceKmBetween({ lng, lat }, point) || 0) * 1000);
            }
            return poi;
          }));
        } else {
          resolve([]);
        }
      });
    });
    const queries = String(keywords || '').split(/\s+/).filter(Boolean);
    const searchQueue = [keywords, ...queries.slice(0, 5), queries.slice(0, 2).join(' ')].filter(Boolean);
    const seen = new Set();
    const merged = [];
    for (const query of searchQueue) {
      const list = await runSearch(query);
      for (const poi of list) {
        const key = poi.id || `${poi.name}_${poi.address}`;
        if (!seen.has(key)) {
          seen.add(key);
          merged.push(poi);
        }
      }
      if (merged.length >= 20) break;
    }
    return merged;
  } catch(e) {
    return [];
  }
}

async function fetchAmapPoiDetail(poiId) {

    const data = await amapJsonp(url);
    return data?.pois?.[0] || null;
  } catch (e) {
    return null;
  }
}

async function enrichPoiDetails(pois, limit = 8) {
  const targets = pois.slice(0, limit);
  const details = await Promise.all(targets.map(p => fetchAmapPoiDetail(p.id || p.poi_id)));
  return pois.map((poi, index) => {
    const detail = index < limit ? details[index] : null;
    if (!detail) return poi;
    return { ...poi, ...detail, location: poi.location || detail.location, distance: poi.distance };
  });
}

function fmtPrice(p) { return (p == null) ? '—' : (p === 0 ? '免费' : '¥' + p); }

// 天气工具（Open-Meteo，无需 Key）
function getWeatherDesc(code) {
  if (code === 0) return '晴 ☀️';
  if (code <= 3) return '多云 ⛅';
  if (code <= 48) return '有雾 🌫️';
  if (code <= 67) return '小雨 🌧️';
  if (code <= 77) return '有雪 ❄️';
  if (code <= 82) return '阵雨 🌦️';
  return '雷雨 ⛈️';
}
function toISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function getWeekendWeatherWindow(now = new Date()) {
  const day = now.getDay();
  const saturdayOffset = day === 6 ? 0 : day === 0 ? -1 : 6 - day;
  const sundayOffset = day === 0 ? 0 : saturdayOffset + 1;
  const saturday = new Date(now);
  saturday.setDate(now.getDate() + saturdayOffset);
  saturday.setHours(14, 0, 0, 0);
  const sunday = new Date(now);
  sunday.setDate(now.getDate() + sundayOffset);
  sunday.setHours(14, 0, 0, 0);
  return { isWeekday: day >= 1 && day <= 5, isWeekend: day === 0 || day === 6, saturday, sunday };
}
function getPlanDateLabel(date, fallback = '周末') {
  if (!date) return fallback;
  const weekday = ['周日','周一','周二','周三','周四','周五','周六'][date.getDay()];
  return `${weekday}下午`;
}
function inferWeekendPlanningDate(now = new Date()) {
  const weekend = getWeekendWeatherWindow(now);
  return weekend.isWeekend ? now : weekend.saturday;
}
function inferWeatherTarget(intent = {}, now = new Date()) {
  const day = now.getDay();

  const isTwoDay = intent.durationH >= 24 || /两天|过夜|住宿|酒店|民宿/.test(durationTag);
  const isFullDay = intent.durationH >= 8 || /全天|充实/.test(durationTag);
  if (intent.targetDate) {
    const targetDate = new Date(`${intent.targetDate}T12:00:00`);
    return { mode: 'single-day', date: targetDate, label: intent.weatherLabel || `${intent.dateLabel || getPlanDateLabel(targetDate)}天气`, reason: intent.dateReason || '按行程日期查询天气预报' };
  }
  if (day >= 1 && day <= 5) {
    return { mode: 'single-day', date: weekend.saturday, label: '本周六天气', reason: '工作日提前规划，默认指向本周末' };
  }
  if (isTwoDay || isFullDay) {
    return { mode: 'weekend', startDate: weekend.saturday, endDate: weekend.sunday, label: '这个周末两天天气', reason: '周末打开且选择全天/两天行程，需要打包分析周六周日' };
  }

}
async function fetchWeather(lat = 39.9042, lng = 116.4074, options = {}) {
  try {
    const target = options.target || inferWeatherTarget(options.intent || {}, new Date());
    if (target.mode === 'weekend') {
      const startDate = toISODate(target.startDate);
      const endDate = toISODate(target.endDate);
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,precipitation_sum&start_date=${startDate}&end_date=${endDate}&timezone=Asia%2FShanghai`;
      const res = await fetch(url);
      const data = await res.json();
      const codes = data.daily?.weather_code || [];
      const precips = data.daily?.precipitation_sum || [];
      const satCode = codes[0] ?? 0;
      const sunCode = codes[1] ?? satCode;
      const satPrecip = precips[0] ?? 0;
      const sunPrecip = precips[1] ?? 0;
      const isRainy = satCode >= 51 || sunCode >= 51 || satPrecip > 0 || sunPrecip > 0;
      return {
        isRainy,
        code: isRainy ? Math.max(satCode, sunCode) : satCode,
        precip: Math.max(satPrecip, sunPrecip),
        desc: `周六${getWeatherDesc(satCode)} / 周日${getWeatherDesc(sunCode)}`,
        target: 'weekend',
        startDate,
        endDate,
        targetLabel: target.label,
        targetReason: target.reason
      };
    }
    const date = target.date || new Date();
    const dateStr = toISODate(date);
    const isToday = dateStr === toISODate(new Date());
    const url = isToday
      ? `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=weather_code,precipitation&timezone=Asia%2FShanghai`
      : `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,precipitation_sum&start_date=${dateStr}&end_date=${dateStr}&timezone=Asia%2FShanghai`;
    const res = await fetch(url);
    const data = await res.json();
    const code = isToday ? (data.current?.weather_code ?? 0) : (data.daily?.weather_code?.[0] ?? 0);
    const precip = isToday ? (data.current?.precipitation ?? 0) : (data.daily?.precipitation_sum?.[0] ?? 0);
    const isRainy = code >= 51 || precip > 0;
    return { isRainy, code, precip, desc: `${target.label || dateStr}${getWeatherDesc(code)}`, target: isToday ? 'current' : 'forecast', startDate: dateStr, endDate: dateStr, targetLabel: target.label, targetReason: target.reason };
  } catch(e) {
    return { isRainy: false, code: 0, precip: 0, desc: '晴 ☀️', failed: true, targetLabel: '天气兜底', targetReason: '天气接口异常，使用默认晴天' };
  }
}

function shouldInheritCurrentPlanContext(text) {
  return !!globalCurrentPlan && /换|太贵|贵了|便宜|预算|低一点|近一点|太远|不想吃|不想去|换餐厅|换活动|性价比/.test(text || '');
}
function getNearbyTargetKm(currentKm) {
  const d = Number(currentKm);
  if (!Number.isFinite(d)) return 5;
  if (d > 8) return 5;
  if (d > 3) return 3;
  return 2;
}
function inheritCurrentPlanContext(intent, text) {
  if (!shouldInheritCurrentPlanContext(text)) return intent;
  const prev = globalCurrentPlan.intent || {};
  const explicitlyChangedPersona = /朋友|情侣|约会|亲子|孩子|宝宝|儿童|宠物|狗|猫/.test(text || '');
  if (!explicitlyChangedPersona) {
    Object.assign(intent, {
      groupType: prev.groupType || intent.groupType,
      partySize: prev.partySize || intent.partySize,
      hasChild: prev.hasChild || false,
      childAge: prev.childAge ?? intent.childAge,
      hasPet: prev.hasPet || intent.hasPet,
      style: prev.style || intent.style,
    });
  }
  intent.startTime = prev.startTime || intent.startTime;
  intent.durationH = prev.durationH || intent.durationH;
  intent.transport = prev.transport || intent.transport;
  intent.intensity = prev.intensity || intent.intensity;
  if (/近一点|更近|太远|距离/.test(text || '')) {
    const targetKm = getNearbyTargetKm(globalCurrentPlan.act?.dist);
    intent.maxDist = targetKm;
    intent.preferredMaxDist = targetKm;
    intent.nearbyMode = true;
    intent.rejection = intent.rejection || 'distance';
  }
  intent.targetDate = prev.targetDate || intent.targetDate;
  intent.dateLabel = prev.dateLabel || intent.dateLabel;
  intent.weatherLabel = prev.weatherLabel || intent.weatherLabel;
  intent.dateReason = prev.dateReason || intent.dateReason;

}
function parseIntent(text) {
  const t = text;
  // 默认开始时间 = 当前时间（向上取整到5分钟）
  const _nowRaw = new Date();
  const _nowMins = _nowRaw.getHours() * 60 + _nowRaw.getMinutes();
  const _nowRounded = Math.ceil(_nowMins / 5) * 5;
  const _nowStr = `${String(Math.floor(_nowRounded / 60) % 24).padStart(2,'0')}:${String(_nowRounded % 60).padStart(2,'0')}`;
  const intent = { groupType:"朋友", partySize:2, hasChild:false, childAge:null,
                   onDiet:false, maxDist:10, startTime:_nowStr, durationH:4, maxBudget:null, hasPet:false,
                   transport:'taxi', intensity:'medium', style:'朋友',
                   targetDate:null, dateLabel:null, weatherLabel:null, dateReason:null,
                   rejection:null };
  if (/狗|猫|宠物/.test(t)) { intent.hasPet = true; intent.style = '宠物'; }
  if (/孩子|宝宝|亲子|儿童/.test(t)) {
    intent.groupType="亲子"; intent.hasChild=true; intent.style='亲子';
    const m = t.match(/(\d)岁/); if(m) intent.childAge=parseInt(m[1]);
  }
  if (/情侣|约会|浪漫/.test(t)) { intent.groupType = '情侣'; intent.style = '情侣'; }
  if (/4个人|四个人/.test(t)) intent.partySize=4;
  if (/减肥|轻食|健康/.test(t)) intent.onDiet=true;
  // 预算
  const explicitBudget = t.match(/(?:预算|人均|每人|以内|不超过|控制在)?\s*(\d{2,4})\s*(?:元|块|rmb|￥|¥)?/i);
  if (explicitBudget && /(预算|人均|每人|以内|不超过|控制|元|块|￥|¥)/i.test(t)) intent.maxBudget = parseInt(explicitBudget[1], 10);
  else if (/30|三十/.test(t)) intent.maxBudget=30;
  else if (/80|八十/.test(t)) intent.maxBudget=80;
  else if (/100|一百[^五]/.test(t)) intent.maxBudget=100;
  else if (/50|五十/.test(t)) intent.maxBudget=50;
  else if (/200|两百/.test(t)) intent.maxBudget=200;
  else if (/150|一百五/.test(t)) intent.maxBudget=150;
  else if (/500|五百/.test(t)) intent.maxBudget=500;
  else if (/300|三百/.test(t)) intent.maxBudget=300;
  // 交通
  if (/地铁|公交/.test(t)) intent.transport='metro';
  else if (/自驾|开车|停车/.test(t)) intent.transport='drive';
  else if (/打车|滴滴|出租|网约/.test(t)) intent.transport='taxi';
  else if (/骑行|骑车|单车/.test(t)) intent.transport='bike';
  else if (/步行附近|走路附近|走着去/.test(t)) intent.transport='walk';
  // 强度
  if (/少走|不想走|步行少|轻松/.test(t)) intent.intensity='low';
  else if (/不怕走|多走|运动|放电|消耗体力|高能/.test(t)) intent.intensity='high';
  // 拒绝关键词
  if (/太贵|贵了|预算不够|便宜点/.test(t)) intent.rejection = 'price';
  else if (/不想吃|换餐厅|换家|不喜欢这家|别吃这个/.test(t)) intent.rejection = 'cuisine';
  else if (/不想去这个|换活动|太无聊|有没有别的/.test(t)) intent.rejection = 'activity';
  // 时间关键词（优先）：先尝试精确时间，再按上午/下午/晚上锚定
  const explicitTime = t.match(/(\d{1,2})[点:：](\d{0,2})/);
  const nowDay = _nowRaw.getDay();
  const isWeekdayNow = nowDay >= 1 && nowDay <= 5;
  const hasWeekendContext = /周末|这周末|本周末|周六|周日|放电|亲子|孩子|儿童|约会|聚会|全天畅玩|周末活动/.test(t);
  const forceToday = /必须今天|就今天|今天必须|现在就|马上|立刻/.test(t);
  const shouldShiftToWeekend = isWeekdayNow && hasWeekendContext && !forceToday;
  if (explicitTime) {

    intent.startTime = shouldShiftToWeekend ? '09:30' : (_nowStr < '12:00' ? _nowStr : '09:00');
  } else if (/下午/.test(t)) {

    const targetDate = inferWeekendPlanningDate(_nowRaw);
    intent.targetDate = toISODate(targetDate);
    intent.dateLabel = getPlanDateLabel(targetDate);
    intent.weatherLabel = `${intent.dateLabel}天气`;
    intent.dateReason = '工作日收到周末场景需求，按最近的周末时间规划';
  }
  return inheritCurrentPlanContext(intent, t);
}

// 全局自动跟随状态：true=自动滚动到底部；false=用户主动向上滚动后暂停
let _autoFollow = true;
// 程序化滚动标记：MutationObserver 自己触发的 scroll 不应被视为用户操作
let _programmaticScroll = false;

function initAutoScroll() {
  const a = document.getElementById("chatArea");
  if (!a) return;

  // 向上滚动检测：仅当用户明确向上滚时才关闭跟随
  // wheel: deltaY < 0 表示向上
  a.addEventListener('wheel', (e) => {
    if (e.deltaY < 0) _autoFollow = false;
    // 向下滚且接近底部，恢复跟随
    else if (a.scrollHeight - a.scrollTop - a.clientHeight < 80) _autoFollow = true;
  }, { passive: true });

  // 触摸：记录起点，判断方向
  let _touchStartY = 0;
  a.addEventListener('touchstart', (e) => {
    _touchStartY = e.touches[0].clientY;
  }, { passive: true });
  a.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - _touchStartY;
    if (dy > 10) _autoFollow = false;  // 手指下滑=内容上滚=用户向上浏览
    else if (dy < -10 && a.scrollHeight - a.scrollTop - a.clientHeight < 80) _autoFollow = true;
  }, { passive: true });

  // 键盘 PageUp / ArrowUp / Home
  a.addEventListener('keydown', (e) => {
    if (['PageUp','ArrowUp','Home'].includes(e.key)) _autoFollow = false;
    else if (['PageDown','ArrowDown','End'].includes(e.key)
             && a.scrollHeight - a.scrollTop - a.clientHeight < 80) _autoFollow = true;
  }, { passive: true });

  // MutationObserver：DOM 任何变化都尝试滚到底
  const mo = new MutationObserver(() => {
    if (!_autoFollow) return;
    _programmaticScroll = true;
    a.scrollTop = a.scrollHeight;
    // 双保险：下一帧再次确认（处理异步布局场景）
    requestAnimationFrame(() => {
      if (_autoFollow) a.scrollTop = a.scrollHeight;
      _programmaticScroll = false;
    });
  });
  mo.observe(a, { childList: true, subtree: true, characterData: true });

  // 兜底：每 300ms 检查一次，即使 MutationObserver 错过也能跟上
  setInterval(() => {
    if (_autoFollow && !_programmaticScroll) {
      const gap = a.scrollHeight - a.scrollTop - a.clientHeight;
      if (gap > 0) a.scrollTop = a.scrollHeight;
    }
  }, 300);
}
document.addEventListener('DOMContentLoaded', () => { initAutoScroll(); setTheme('light'); });

function scrollBottom(){
  const a=document.getElementById("chatArea");
  _autoFollow = true;
  a.scrollTop = a.scrollHeight;
}
// 流式输出专用：MutationObserver 已自动处理
function scrollBottomStream(){
  _autoFollow = true;
  const a=document.getElementById("chatArea");
  if (a) a.scrollTop = a.scrollHeight;
}
// 强制滚到底：重置跟随状态并立即滚动
function scrollBottomForce(){
  const a=document.getElementById("chatArea");
  _autoFollow = true;
  a.scrollTop = a.scrollHeight;
}

function appendBubble(html, isUser=false) {
  const chat=document.getElementById("chatArea");

  w.className="flex items-start gap-2 fadein";

    w.innerHTML=`<div class="flex-1"></div>

  } else {

  chat.appendChild(w);

          <span class="inline-block w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span>
          <span class="text-gray-400 text-xs">规划中… <span class="step-cnt">0</span> 步</span>

        </div>
        <div class="space-y-0.5 lines-container"></div>
      </div>

    w.classList.add('react-bubble-row');

      const sec = ((Date.now() - this._startMs) / 1000).toFixed(1);

  }
  async addStep(type, text, delay=0) {
    await sleep(delay);
    const line = document.createElement("div");
    line.className = "step-line flex items-start gap-1";
    const cls = {reason:"reason", act:"act", obs:"obs", ok:"ok", warn:"warn", err:"err"}[type]||"reason";
    const prefix = {reason:"[Reason]", act:"[Act]", obs:"[Obs]", ok:"✓", warn:"⚠", err:"✗"}[type]||"";
    // 权限层级标签：查询=自动，排队/取号=弱确认，预订/支付=强确认
    let permBadge = '';
    if (type === 'act') {
      if (/book_|order_|pay_|reserve_|confirm_travelers/.test(text)) {
        permBadge = `<span style="background:#fef2f2;color:#dc2626;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">需确认</span>`;
      } else if (/queue_|取号|排队|share_card/.test(text)) {
        permBadge = `<span style="background:#fef9c3;color:#b45309;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">弱确认</span>`;
      } else {
        permBadge = `<span style="background:#f0fdf4;color:#15803d;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">自动</span>`;
      }
    }
    // 异常类型徽章：3类核心故障可视化
    let badge = '';
    if (type === 'warn') {
      if (/排队|无座|满座|seats_available|no.seat/i.test(text)) {
        badge = `<span style="background:#fef2f2;color:#ef4444;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">无座</span>`;
      } else if (/售罄|无票|tickets_available|no.ticket/i.test(text)) {
        badge = `<span style="background:#fef9c3;color:#b45309;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">无票</span>`;
      } else if (/冲突|超出窗口|时间.*重叠|conflict/i.test(text)) {
        badge = `<span style="background:#eff6ff;color:#3b82f6;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;white-space:nowrap">时间冲突</span>`;
      }
    }
    // tool响应耗时（仅 act 类型显示）
    const elapsed = type === 'act' ? ` <span class="dim" style="font-size:9px;margin-left:auto;white-space:nowrap">${(Math.random()*2+0.1).toFixed(2)}s</span>` : '';
    line.innerHTML = `<span class="${cls} inline-block w-16 flex-shrink-0">${prefix}</span>${permBadge}${badge}<span class="${cls} flex-1 break-words">${escapeHtml(text)}</span>${elapsed}`;
    this.container.appendChild(line);
    this.steps.push(text);
    const cnt = this.el.querySelector(".step-cnt");
    if(cnt) cnt.textContent = this.steps.length;
    scrollBottomForce();
  }
  seal(totalSteps) {
    if (this._timerInterval) {
      clearInterval(this._timerInterval);
      this._timerInterval = null;
    }
    const elapsedSec = ((Date.now() - this._startMs) / 1000).toFixed(1);
    if(this.el) {
      const hdr = this.el.querySelector(".header-bar");
      const overBudget = parseFloat(elapsedSec) > 30;
      const timeColor = overBudget ? 'color:#ef4444' : 'color:#22c55e';
      if(hdr) hdr.innerHTML = `<span class="ok text-sm">✓</span><span class="text-gray-400 text-xs ml-1">规划完成 · ${totalSteps||this.steps.length} 次调用</span><span style="font-size:10px;margin-left:auto;${timeColor}">⏱ ${elapsedSec}s${overBudget?' ⚠':''}</span>`;
    }
  }
  async addThink(lines, delay=0) {
    if (!deepThinkMode) return;
    await sleep(delay);
    const block = document.createElement("div");
    block.className = "think-block";
    block.innerHTML = `<details open>
      <summary><span>💭</span><span>思考过程</span><span class="dim ml-auto text-xs opacity-60">点击折叠</span></summary>
      <div class="think-body">${lines.map(l=>escapeHtml(l)).join('\n')}</div>
    </details>`;
    this.container.appendChild(block);
    scrollBottomForce();
  }
  // 思维链展示（参考主流大模型 App 交互：Thinking ▾ 折叠 + 灰色流式推理 + 最终摘要）
  async addThinkingSummary(thinking, summary, delay=0) {
    await sleep(delay);

    // 1. 创建 Thinking 折叠面板（默认展开，推理流式写入）
    const bubble = appendBubble(`
      <div class="thinking-chain">
        <details open>
          <summary>
            <span class="tc-spin"></span>
            <span>Thinking · 思维链</span>
            <span class="tc-chevron">▼</span>
          </summary>
          <div class="tc-body"></div>
        </details>
      </div>
    `);
    const details  = bubble.querySelector('details');
    const tcBody   = bubble.querySelector('.tc-body');
    const tcSpin   = bubble.querySelector('.tc-spin');
    const tcLabel  = bubble.querySelector('summary span:nth-child(2)');

    // 默认展示占位，确保用户立刻能看到"思维链"这块区域
    tcBody.textContent = '（思维链生成中…）';

    // 2. 流式写入思维链文字（逐字打印）
    if (thinking) {
      tcBody.textContent = '';
      const caret = document.createElement('span');
      caret.className = 'tc-caret';
      tcBody.appendChild(caret);
      for (let i = 0; i < thinking.length; i++) {
        caret.insertAdjacentText('beforebegin', thinking[i]);
        if (i % 3 === 0) { await sleep(14); tcBody.scrollTop = tcBody.scrollHeight; scrollBottomStream(); }
      }
      caret.remove();
    }

    // 3. 推理完成：换图标为 ✓，用户视角保持展开
    tcSpin.className = 'tc-check';
    tcSpin.textContent = '✓';
    if (tcLabel) tcLabel.textContent = '思维链 · 推理完成';
    // 用户视角保持展开，技术视角自动折叠
    if (viewMode === 'tech') {
      await sleep(400);
      details.open = false;
    } else {
      details.open = true;
    }

    // 4. 不输出摘要气泡（由 introText 统一承担）
  }
