const agentMetrics = {
  sessionStart: Date.now(),
  requests: 0,           // 总请求次数
  plansGenerated: 0,     // 成功生成方案次数
  toolCalls: 0,          // 工具调用总次数
  toolFailures: 0,       // 工具失败次数
  toolRecoveries: 0,     // 故障恢复次数
  intentCorrections: 0,  // 用户纠正意图次数
  planAdopted: 0,        // 用户确认方案次数
  firstRoundAdoptions: 0, // 首轮方案被采纳次数
  planReplaced: 0,       // 换方案次数
  shares: 0,             // 分享次数
  bookings: 0,           // 进入预订/排队动作次数
  activityClicks: 0,     // 活动卡点击次数
  restaurantClicks: 0,   // 餐厅卡点击次数
  hotelClicks: 0,        // 酒店卡点击次数
  crossCategoryClicks: 0, // 同一方案中跨品类点击
  decisionRounds: [],    // 每次确认前经历几轮规划
  ratings: [],           // [{score, reason}]
  feedbackLogs: [],      // 可归因反馈日志
  localReplans: 0,       // 局部重规划次数
  localReplanAccepted: 0, // 局部重规划后被采纳次数
  preferenceUpdates: 0,  // 用户画像更新次数
  constraintViolations: 0, // 违反硬约束次数
  unauthorizedActions: 0,  // 未授权执行次数（应永远=0）
  intentConfirmations: 0,  // 意图闸门展示次数
  planConfirmations: 0,    // 方案确认闸门次数
  executionConfirmations: 0, // 执行确认次数
  sourceDisclosures: 0,    // 数据来源披露次数
  riskDisclosures: 0,      // 风险提示披露次数
  toolLimitStops: 0,       // 工具上限触发次数
  toolLogs: [],            // 结构化工具调用日志
  toolInputInvalid: 0,     // 参数校验失败
  toolOutputInvalid: 0,    // 结果校验失败
  deterministicExecutions: 0, // 走固定 Workflow 的执行次数
  planTimes: [],           // 每次规划耗时 ms
  _planStartMs: null,
  _currentDecisionRounds: 0,
  _clickedCats: new Set(),
  startPlan() { this._planStartMs = Date.now(); this.requests++; this._currentDecisionRounds++; this._clickedCats = new Set(); },
  endPlan(success) {
    if (this._planStartMs) { this.planTimes.push(Date.now() - this._planStartMs); this._planStartMs = null; }
    if (success) this.plansGenerated++;
  },
  logToolCall(entry) {
    this.toolLogs.push({ ts: Date.now(), ...entry });
    this.toolCalls++;
    if (entry.status !== 'success') this.toolFailures++;
    if (entry.recovered) this.toolRecoveries++;
  },
  addRating(score, reason) { this.ratings.push({ score, reason, ts: Date.now() }); },
  logFeedback(type, reason, module='plan', accepted=false) {
    this.feedbackLogs.push({ planId: globalCurrentPlan?.planId || `P${Date.now()}`, type, reason, module, accepted, ts: Date.now() });
  },
  feedbackReasonDist() {
    return this.feedbackLogs.reduce((acc, f) => { acc[f.type] = (acc[f.type] || 0) + 1; return acc; }, {});
  },
  localReplanSuccessRate() { return this.localReplans ? Math.round(this.localReplanAccepted / this.localReplans * 100) : null; },
  recordCategoryClick(cat) {
    if (cat === '活动' || cat === '景点') this.activityClicks++;
    else if (cat === '餐厅' || /餐/.test(cat)) this.restaurantClicks++;
    else if (cat === '住宿' || /酒店|民宿/.test(cat)) this.hotelClicks++;
    this._clickedCats.add(cat === '景点' ? '活动' : /餐/.test(cat) ? '餐饮' : /酒店|民宿|住宿/.test(cat) ? '住宿' : cat);
    if (this._clickedCats.size >= 2) this.crossCategoryClicks++;
  },
  recordAdoption() {
    this.planAdopted++;
    if (this._currentDecisionRounds <= 1) this.firstRoundAdoptions++;
    this.decisionRounds.push(Math.max(1, this._currentDecisionRounds));
    this._currentDecisionRounds = 0;
  },
  avgPlanTime() { return this.planTimes.length ? Math.round(this.planTimes.reduce((a,b)=>a+b,0)/this.planTimes.length/100)/10 : null; },
  planSuccessRate() { return this.requests ? Math.round(this.plansGenerated/this.requests*100) : null; },
  toolSuccessRate() { const total = this.toolCalls; return total ? Math.round((total-this.toolFailures)/total*100) : null; },
  adoptionRate() { return this.plansGenerated ? Math.round(this.planAdopted/this.plansGenerated*100) : null; },
  firstRoundAdoptionRate() { return this.plansGenerated ? Math.round(this.firstRoundAdoptions/this.plansGenerated*100) : null; },
  avgDecisionRounds() { return this.decisionRounds.length ? (this.decisionRounds.reduce((a,b)=>a+b,0)/this.decisionRounds.length).toFixed(1) : null; },
  crossCategoryRate() { return this.plansGenerated ? Math.round(this.crossCategoryClicks/this.plansGenerated*100) : null; },
  bookingRate() { return this.plansGenerated ? Math.round(this.bookings/this.plansGenerated*100) : null; },
  hardConstraintViolationRate() { return this.plansGenerated ? Math.round(this.constraintViolations/this.plansGenerated*100) : null; },
  avgToolLatency() { return this.toolLogs.length ? Math.round(this.toolLogs.reduce((s,l)=>s+(l.latency||0),0)/this.toolLogs.length) : null; },
  toolResultUseRate() { const used = this.toolLogs.filter(l => l.usedInFinalPlan).length; return this.toolLogs.length ? Math.round(used/this.toolLogs.length*100) : null; },
  deterministicExecutionRate() { return this.bookings ? Math.round(this.deterministicExecutions/this.bookings*100) : 100; },
  controlledActionRate() {
    const gated = this.intentConfirmations + this.planConfirmations + this.executionConfirmations;
    const risky = gated + this.unauthorizedActions;
    return risky ? Math.round(gated / risky * 100) : 100;
  },
  transparencyCoverage() {
    return this.plansGenerated ? Math.min(100, Math.round((this.sourceDisclosures + this.riskDisclosures) / (this.plansGenerated * 2) * 100)) : 0;
  },
  avgRating() { return this.ratings.length ? (this.ratings.reduce((s,r)=>s+r.score,0)/this.ratings.length).toFixed(1) : null; },
};

const TOOL_SCHEMAS = {
  parse_intent: { requiredInput:['text'], requiredOutput:['groupType','partySize','startTime'] },
  search_activities: { requiredInput:['lat','lng','keywords','city'], requiredOutput:['name','address'] },
  search_restaurants: { requiredInput:['lat','lng','keywords','city'], requiredOutput:['name','address'] },
  search_hotels: { requiredInput:['lat','lng','keywords','city'], requiredOutput:['name','address'] },
  check_weather: { requiredInput:['lat','lng','target'], requiredOutput:['desc'] },
  create_reservation: { requiredInput:['poiId','time','partySize'], requiredOutput:['status'] },
  share_plan: { requiredInput:['planId'], requiredOutput:['status'] },
};

function validateToolPayload(schemaName, payload, direction='input') {
  const schema = TOOL_SCHEMAS[schemaName];
  if (!schema) return { ok:true, missing:[] };
  const keys = direction === 'input' ? schema.requiredInput : schema.requiredOutput;
  const missing = keys.filter(k => payload == null || payload[k] == null || payload[k] === '');
  if (missing.length) {
    if (direction === 'input') agentMetrics.toolInputInvalid++;
    else agentMetrics.toolOutputInvalid++;
  }
  return { ok: missing.length === 0, missing };
}

function loadUserPreferenceProfile() {
  try { return JSON.parse(localStorage.getItem('weekendAgentPreferenceProfile') || '{}'); }
  catch { return {}; }
}

function saveUserPreferenceProfile(profile) {
  localStorage.setItem('weekendAgentPreferenceProfile', JSON.stringify(profile));
}

function updatePreferenceFromFeedback(type) {
  const profile = loadUserPreferenceProfile();
  const bump = (key) => { profile[key] = (profile[key] || 0) + 1; };
  if (type === 'too_far') bump('distance_sensitive');
  if (type === 'too_expensive') bump('price_sensitive');
  if (type === 'not_child_friendly') bump('often_with_child');
  if (type === 'avoid_queue') bump('queue_sensitive');
  if (type === 'change_activity') bump('activity_picky');
  if (type === 'change_restaurant') bump('restaurant_picky');
  profile.updatedAt = Date.now();
  saveUserPreferenceProfile(profile);
  agentMetrics.preferenceUpdates++;
  return profile;
}

function feedbackTypeLabel(type) {
  return ({ satisfied:'满意', too_far:'太远', too_expensive:'太贵', activity_mismatch:'活动不合适', restaurant_mismatch:'餐厅不合适', change_activity:'换活动', change_restaurant:'换餐厅', not_child_friendly:'不适合孩子', avoid_queue:'不想排队' })[type] || type;
}

function recordToolResult(toolName, input, output, options={}) {
  const inputCheck = validateToolPayload(toolName, input, 'input');
  const outputSample = Array.isArray(output) ? (output[0] || {}) : (output || {});
  const outputCheck = validateToolPayload(toolName, outputSample, 'output');
  const outputCount = Array.isArray(output) ? output.length : output ? 1 : 0;
  const status = options.status || (!inputCheck.ok ? 'invalid_input' : !outputCheck.ok ? 'invalid_output' : outputCount === 0 ? 'empty' : 'success');
  agentMetrics.logToolCall({
    toolName,
    input,
    outputCount,
    status,
    latency: options.latency || 0,
    usedInFinalPlan: !!options.usedInFinalPlan,
    failureReason: options.failureReason || (!inputCheck.ok ? `missing input: ${inputCheck.missing.join(',')}` : !outputCheck.ok ? `missing output: ${outputCheck.missing.join(',')}` : ''),
    recovered: !!options.recovered,
  });
}

async function runToolWithLog(toolName, input, fn, options={}) {
  const started = Date.now();
  const inputCheck = validateToolPayload(toolName, input, 'input');
  if (!inputCheck.ok) {
    recordToolResult(toolName, input, null, { status:'invalid_input', latency:Date.now()-started, failureReason:`missing input: ${inputCheck.missing.join(',')}` });
    return options.fallback || [];
  }
  try {
    const output = await fn();
    recordToolResult(toolName, input, output, { latency:Date.now()-started, usedInFinalPlan: options.usedInFinalPlan });
    return output;
  } catch (e) {
    recordToolResult(toolName, input, null, { status:'error', latency:Date.now()-started, failureReason:e?.message || 'tool error' });
    return options.fallback || [];
  }
}

async function runAgentFlow(userText, currentAlt, isVoted=false, prebuiltIntent=null, votedRstId=null) {
  agentMetrics.startPlan();
  // prebuiltIntent：表单直接构建时跳过 LLM 意图解析
  const thinkBubble = appendThinking();
  const llmActive = !!(llmAppKey);
  let intent;
  if (prebuiltIntent) {
    intent = prebuiltIntent;
    thinkBubble.remove();
  } else {
    intent = llmActive
      ? await parseIntentWithLLM(userText)
      : parseIntent(userText);
    await sleep(400);
    thinkBubble.remove();
  }

  // Feature 3: 显示槽位收集状态
  agentMetrics.intentConfirmations++;
  showSlotStatus(intent);

  // ── 约束冲突检测：提前识别不可能满足的条件组合 ──
  const conflicts = [];
  if (intent.maxBudget && intent.maxBudget < 30) conflicts.push({ msg: `预算¥${intent.maxBudget}较难覆盖活动+餐厅，建议放宽到¥80+`, relax: '预算放宽到80' });
  if (intent.maxDist && intent.maxDist <= 1 && intent.hasChild) conflicts.push({ msg: `1km内很难找到亲子活动，建议放宽到5km`, relax: '距离放宽到5km' });
  if (intent.durationH && intent.durationH <= 1 && intent.hasChild) conflicts.push({ msg: `1小时时间带孩子出行较紧，建议至少安排2小时`, relax: '时间改为2小时' });
  if (intent.maxBudget && intent.maxBudget < 50 && intent.durationH >= 8) conflicts.push({ msg: `全天行程人均¥${intent.maxBudget}难以覆盖三餐+活动，建议放宽预算`, relax: '预算放宽' });
  if (conflicts.length > 0) {
    agentMetrics.constraintViolations += conflicts.length;
    const conflictHtml = conflicts.map(c =>
      `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="color:#d97706;font-size:12px">⚠</span>
        <span style="font-size:12px;color:#92400e;flex:1">${c.msg}</span>
        <button onclick="document.getElementById('userInput').value='${c.relax}';document.getElementById('userInput').focus()" style="font-size:10px;padding:2px 7px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;cursor:pointer;color:#92400e;white-space:nowrap">${c.relax}</button>
      </div>`
    ).join('');
    const conflictEl = appendBubble(`
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 13px;max-width:300px">
        <div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:6px">检测到约束可能冲突</div>
        ${conflictHtml}
        <div style="font-size:11px;color:#a16207;margin-top:4px">会先继续给出可执行备选，最终是否放宽由你决定。</div>
      </div>`);
    conflictEl.style.display = viewMode === 'user' ? 'none' : '';
    await sleep(300);
  }

  // Feature 2: 拒绝反馈 → 局部重绘（只替换被拒绝的节点，不重新跑完整思考链）
  if (globalCurrentPlan && intent.rejection === 'cuisine') {
    await localRepaintRestaurant(intent);
    agentMetrics.endPlan(true);
    return;
  }
  if (globalCurrentPlan && intent.rejection && intent.rejection !== 'distance') {
    globalCurrentPlan = null;
  }

  // 🔴 亮点2：状态机局部重规划 (Partial Re-planning)
  if (globalCurrentPlan && intent.hasPet) {
    globalCurrentPlan = null;
  }

  // 正常流程
  // ── 工具调用上限守卫（防止死循环/失控调用）──
  let _toolCallCount = 0;
  const MAX_TOOL_CALLS = 20;
  const guardedAddStep = async (type, text, delay=0) => {
    if (type === 'act') {
      _toolCallCount++;
      agentMetrics.toolCalls++;
      if (_toolCallCount > MAX_TOOL_CALLS) {
        agentMetrics.toolLimitStops++;
        await reactor.addStep('warn', `已达工具调用上限(${MAX_TOOL_CALLS}次)，停止继续搜索`, 100);
        return false; // 调用方检查返回值决定是否继续
      }
    }
    await reactor.addStep(type, text, delay);
    return true;
  };
  appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs">
    好的，帮你规划一个

  const restaurantKeywords = intent.hasPet

    const rawFallbackActs = await searchAmapPOI(loc.lat, loc.lng, '亲子乐园 儿童乐园 室内游乐场 科技馆 博物馆 商场 公园 文化 娱乐', '060100|110000|140000', loc.city);
    const detailedFallbackActs = await enrichPoiDetails(rawFallbackActs, 8);
    realActs = filterValidActivities(detailedFallbackActs.slice(0, 12).map(amapPoiToActivity)).slice(0, 8);
    realAttractions = realActs.slice(0, 6);
  }
  if (!realRsts.length) {
    await reactor.addStep("act", `fallback_search_restaurants(city='${loc.city}', keywords='餐厅 咖啡 小吃 美食 商场', source='高德实时')`, 250);
    const rawFallbackRsts = await searchAmapPOI(loc.lat, loc.lng, '餐厅 咖啡 小吃 美食 商场', '050000', loc.city);
    realRsts = (await enrichPoiDetails(rawFallbackRsts, 8)).slice(0, 8).map(amapPoiToRestaurant);
  }
  if (needsHotel && !realHotels.length) {
    await reactor.addStep("act", `fallback_search_hotels(city='${loc.city}', keywords='酒店 民宿 住宿', source='高德实时')`, 250);
    const rawFallbackHotels = await searchAmapPOI(loc.lat, loc.lng, '酒店 民宿 住宿', '100000|110100|110200', loc.city);
    realHotels = (await enrichPoiDetails(rawFallbackHotels, 4)).slice(0, 4).map(amapPoiToHotel);
  }
  const hasRealData = realActs.length > 0 && realRsts.length > 0 && (!needsHotel || realHotels.length > 0);
  await reactor.addStep(hasRealData ? "ok" : "warn",
    hasRealData
      ? `→ 召回 ${realActs.length} 个活动/景点 / ${realRsts.length} 家餐厅${needsHotel ? ` / ${realHotels.length} 家酒店民宿` : ''}（已过滤${activityLimitKm}km外不合理距离）`
      : `→ 真实 POI 不完整：活动/景点${realActs.length || realAttractions.length} / 餐厅${realRsts.length}${needsHotel ? ` / 酒店${realHotels.length}` : ''}，已过滤${activityLimitKm}km外不合理距离`, 200);

  if (!hasRealData) {
    const backupAct = [...baseActs, ...baseAttractions].filter(Boolean)[0];
    const backupRst = baseRsts.filter(Boolean)[0];
    const backupHotel = baseHotels.filter(Boolean)[0];
    if (backupAct && backupRst && (!needsHotel || backupHotel)) {
      const safeBackupAct = filterValidActivities([amapPoiToActivity(backupAct, 0)])[0];
      if (!safeBackupAct) {
        reactor.seal();
        appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs leading-relaxed">这次召回的地点不太适合亲子出行，我先不硬凑方案。你可以换个商圈或放宽距离，我再重新找儿童乐园/科技馆/运动馆。</div>`);
        return;
      }
      realActs = [safeBackupAct];
      realAttractions = realActs.slice();
      realRsts = [amapPoiToRestaurant(backupRst, 0)];
      realHotels = needsHotel ? [amapPoiToHotel(backupHotel, 0)] : [];
      await reactor.addStep("warn", "→ 已放宽风格/距离过滤，使用真实 POI 兜底生成可执行方案", 200);
    } else {
      reactor.seal();
      appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs leading-relaxed">我这边真实地点召回还是偏少，先帮你换成更宽泛的“咖啡/书店/餐厅/商圈”重新试一次。也可以补充目的地城市，我会继续只用真实地点推荐。</div>`);
      return;
    }
  }
  const chosenHotel = needsHotel ? (realHotels[0] || null) : null;
  const userPoint = { lng: loc.lng, lat: loc.lat };
  const routeDistance = (fromPoi, toPoi) => distanceKmBetween(fromPoi?.location || userPoint, toPoi?.location) ?? toPoi?.dist ?? null;
  const preferNearby = (list, fromPoi = null, preferredKm = preferredTripKm) => {
    const nearby = list.filter(poi => (routeDistance(fromPoi, poi) ?? poi.dist ?? 999) <= preferredKm);
    if (intent.nearbyMode) return nearby.length ? nearby : list.slice(0, 1);
    return nearby.length >= Math.min(2, list.length) ? nearby : list;
  };
  realActs = preferNearby(realActs, null, preferredTripKm);
  realAttractions = preferNearby(realAttractions, realActs[0], preferredTripKm);
  const sortByRouteFit = (list, fromPoi = null) => list.slice().sort((a, b) => {
    const da = routeDistance(fromPoi, a) ?? 999;
    const db = routeDistance(fromPoi, b) ?? 999;
    const ra = a.rating || 4.6;
    const rb = b.rating || 4.6;
    const pa = a.price == null ? 80 : a.price;
    const pb = b.price == null ? 80 : b.price;
    if (intent.nearbyMode) return da - db || (rb - ra) * 0.2 || (pa - pb) * 0.01;
    return (db - da) * 4 + (rb - ra) * 2 + (pa - pb) * 0.01;
  });
  realActs = sortByRouteFit(realActs);
  realAttractions = sortByRouteFit(realAttractions, realActs[0]);
  realRsts = preferNearby(realRsts, realAttractions[0] || realActs[0], Math.min(5, preferredTripKm));
  realRsts = sortByRouteFit(realRsts, realAttractions[0] || realActs[0]);
  realHotels = sortByRouteFit(realHotels, realRsts[0]);
  const nearbyRsts = realRsts.filter(r => (routeDistance(realAttractions[0] || realActs[0], r) ?? 999) <= ((intent.durationH || 4) <= 4.5 ? 3 : 5));
  if (nearbyRsts.length) realRsts = nearbyRsts;

  // 全量使用真实搜索结果，不再混入 Mock 地点
  const mergedActs = { [intent.groupType]: realActs, '朋友': realActs, '亲子': realActs, '情侣': realActs, '宠物': realActs };
  const mergedRsts = realRsts;

  // 实时天气查询（复用已提前获取的结果）
  await reactor.addStep("act",`check_weather(date='${weatherEarly.targetLabel || weatherEarly.startDate || 'today'}', lat=${loc.lat.toFixed(4)}, lng=${loc.lng.toFixed(4)}, source='${weatherEarly.target === 'weekend' ? 'open-meteo周末预报' : weatherEarly.target === 'forecast' ? 'open-meteo指定日期预报' : 'open-meteo实时'}')`, 300);
  const weather = weatherEarly;
  await reactor.addStep(
    weather.isRainy ? "warn" : "ok",
    `→ ${weather.targetLabel || (weather.target === 'weekend' ? '本周末天气' : '当前天气')}：${weather.desc}${weather.targetReason?`（${weather.targetReason}）`:''}${weather.failed?' (API超时，已降级)':''}${weather.isRainy?`，降雨${weather.precip}mm，首推已优先选择室内场馆`:'，适合户外活动'}`,
    200
  );
  await reactor.addStep("reason", `Plan A = 基于实时天气与评分的首推；Plan B = 若首选排队拥挤/交通受阻时的备选`, 150);

  // ── LLM 并行选择最优组合（与 ToT 动画同步进行，不增加延迟）──
  // Bug1 Fix：活动候选先按预算过滤，activity.price 不超预算的 70%（留 30% 给餐饮）
  const allCandidateActs = (mergedActs[intent.groupType]||mergedActs["朋友"]||[]);
  const candidateActs = intent.maxBudget
    ? (allCandidateActs.filter(a => (a.price ?? 0) <= intent.maxBudget * 0.7).length > 0
        ? allCandidateActs.filter(a => (a.price ?? 0) <= intent.maxBudget * 0.7)
        : allCandidateActs.slice().sort((a,b) => (a.price??0) - (b.price??0)))  // 至少按价格排序取最便宜
    : allCandidateActs;
  const llmSelectPromise = llmActive
    ? selectWithLLM(candidateActs, mergedRsts, intent, weather)
    : Promise.resolve(null);

  // 深度思考块1：用户画像分析与约束推导
  await reactor.addThink(intent.hasChild ? [
    `用户画像：成人${intent.partySize-1}+儿童1(${intent.childAge||5}岁)，${intent.onDiet?'主要成员减肥中':'饮食无特殊约束'}`,
    `→ 活动约束：${intent.childAge||5}岁体力上限约1.5-2h，排除爬坡/长距离步行`,
    `→ 儿童安全：需有围栏/监护区域，排除开放水域/高空项目`,
    intent.onDiet ? `→ 饮食约束：主食低卡<500kcal，同时需要儿童餐/儿童椅` : `→ 饮食无特殊约束，优先环境氛围`,
    `→ 距离约束：<${intent.maxDist}km，避免孩子路上疲劳`,
    `综合权重：儿童友好(0.35) > 饮食匹配(0.28) > 距离(0.22) > 价格(0.15)`,
  ] : [
    `用户画像：${intent.partySize}人${intent.groupType}局，娱乐/社交导向`,
    intent.hasPet ? `→ 宠物约束：必须过滤 petFriendly=true 场所，优先户外/草坪` : `→ 无特殊约束，活动类型开放`,
    `→ 预算评估：人均¥100-300 为合理区间`,
    `→ 群体决策复杂度↑，建议生成多方案供群内投票`,
    `决策策略：多样化候选方案(刺激 vs 休闲) → 投票 → 执行`,
  ], 200);

  // 🔴 亮点1：模拟人格打分器 (Persona-based ToT Evaluator)
  // 预先取候选数据，给 ToT 文案用
  const actsForTot = (mergedActs[intent.groupType]||mergedActs["朋友"]||[]);
  const totActA = actsForTot[0]?.name || '热门场馆';
  const totActB = actsForTot[1]?.name || totActA;
  const budgetLabel = intent.maxBudget ? `¥${intent.maxBudget}以内` : '¥100-300';
  const transportLabel = {'taxi':'打车','metro':'地铁','drive':'自驾','bike':'骑行','walk':'步行'}[intent.transport]||'打车';
  const intensityLabel = {'low':'少走路','medium':'适度','high':'走多点'}[intent.intensity]||'适度';

  await reactor.addStep("reason", "启动 ToT 多路径规划与 Persona 模拟打分", 300);
  await reactor.addStep("act", `generate_and_evaluate(persona='${intent.groupType}${intent.hasChild?"/带娃":""}${intent.onDiet?"/减肥":""}', transport=${transportLabel}, intensity=${intensityLabel})`, 400);
  await reactor.addStep("obs", "→ 方案A(74分) | 方案B(95分) | 方案C(81分)", 300);

  // 深度思考块2：ToT路径评估推理（动态文案）
  await reactor.addThink([
    `ToT 扩展：生成3条规划路径，模拟 Persona="${intent.groupType}${intent.hasChild?'+带娃':''}${intent.onDiet?'+减肥':''}" 视角打分`,
    `约束：交通=${transportLabel}，强度=${intensityLabel}，预算=${budgetLabel}`,
    ``,
    `路径A：[${totActA}]（热门/评分高）+ 正餐（${budgetLabel}偏高）`,
    `  → Persona反馈：${intent.maxBudget && totActA ? '"价格超出预算"' : '"距离略远，出行成本高"'} → 扣21分 → 74分`,
    ``,
    `路径B：[${totActB||totActA}]（距离近/${intensityLabel}匹配）+ ${intent.onDiet?'轻食':'餐厅'}  ← 选择`,
    `  → Persona反馈："${intent.hasChild?'孩子友好，':''}${intent.onDiet?'低卡饮食达标，':''}出行方式匹配，综合最优" → 95分`,
    ``,
    `路径C：免费文化活动 + 快餐`,
    `  → Persona反馈："${intent.onDiet?'快餐热量超标':'快餐体验一般'}，${intent.hasChild?'文化类不适合孩子':'文化类氛围偏安静'}" → 81分`,
    ``,
    `决策：采纳路径B，隐性需求命中率最高`,
  ], 200);
  await reactor.addStep("ok", `LLM决策：采纳路径B，Persona 综合评分 95/100`, 200);

  // await LLM 选择结果（此时 ToT 动画已跑完，LLM 大概率已返回）
  const llmSelect = await llmSelectPromise;
  if (llmActive) {
    await reactor.addStep(
      llmSelect ? "ok" : "dim",
      llmSelect
        ? `→ GLM 选定：活动[${candidateActs[llmSelect.actIndex]?.name}] × 餐厅[${mergedRsts[llmSelect.rstIndex]?.name}]`
        : `→ LLM 选择超时，降级到评分优先策略`,
      200
    );
  }

  const acts = candidateActs;
  // 当用户已投票（isVoted=true）时，currentAlt 是用户明确的选择，不允许 LLM 覆盖
  const chosenActIdx = (isVoted && currentAlt != null)
    ? currentAlt
    : (llmSelect ? llmSelect.actIndex : (currentAlt || 0));
  const chosenAct = acts[chosenActIdx] || acts[0];
  if (llmSelect?.reason) chosenAct.reason = llmSelect.reason;

  // ── 票务可用性检查（异常类型1：no_ticket）──
  await reactor.addStep("act", `check_availability(poi='${chosenAct?.poi_id}', type='ticket', party=${intent.partySize})`, 250);
  if (chosenAct && chosenAct.available === false) {
    await reactor.addStep("warn", `[无票] ${chosenAct.name} 当日票已售罄，已改用备选活动供你确认`, 200);
    const altAct = acts[(chosenActIdx + 1) % acts.length];
    if (altAct) {
      await reactor.addStep("ok", `备选活动: [${altAct.name}] 余票充足 ✓`, 150);
      appendBubble(`<div class="bubble-ai px-4 py-2 text-xs text-yellow-700 bg-yellow-50 border border-yellow-200 rounded-xl max-w-xs">
        ⚠️ <b>${escapeHtml(chosenAct.name)}</b> 当日票已售罄，已改用 <b>${escapeHtml(altAct.name)}</b> 作为备选，余票充足，确认后再继续。
      </div>`);
      chosenAct = altAct;
    }
  } else {
    await reactor.addStep("ok", `${chosenAct?.name || '所选活动'} 余票充足，确认预留 ✓`, 150);
  }

  let filteredRsts = mergedRsts.filter(r => {
    if(intent.hasChild && !r.childFriendly) return false;
    if(intent.onDiet && r.diet && !r.diet.some(d=>d.includes("低卡"))) return false;
    // Bug2 Fix：预算约束，餐厅价格 ≤ (总预算 - 活动费用)，且保底不低于 ¥30
    if(intent.maxBudget && r.price != null) {
      const actCost = (chosenAct && chosenAct.price != null) ? chosenAct.price : 0;
      const budgetForRst = Math.max(30, intent.maxBudget - actCost);
      if(r.price > budgetForRst) return false;
    }
    return true;
  });
  if(!filteredRsts.length) {
    // Bug2 Fix：fallback 仍然尊重预算，按价格升序取最便宜的选项，而非完全放弃约束
    const childOk = mergedRsts.filter(r => !intent.hasChild || r.childFriendly);
    const base = childOk.length ? childOk : mergedRsts;
    filteredRsts = base.slice().sort((a, b) => (a.price ?? 0) - (b.price ?? 0));
  }
  const topActs = acts.slice(0, 3).map(a => `${a.name}:${scorePoi(a, { fit: intent.hasChild ? 8 : 4 })}`).join(' / ');
  const topRsts = filteredRsts.slice(0, 3).map(r => `${r.name}:${scorePoi(r, { fit: intent.onDiet ? 8 : 4 })}`).join(' / ');
  await reactor.addStep("obs", `→ 候选打分 活动[${topActs || '—'}] 餐厅[${topRsts || '—'}]`, 160);

  // LLM 选定的餐厅（优先），否则走可用性检查
  // 当用户已投票时，votedRstId 对应的餐厅优先级最高，不被 LLM 覆盖
  const votedRst = votedRstId ? mergedRsts.find(r => r.poi_id === votedRstId) : null;
  const llmRstCandidate = (!isVoted && llmSelect) ? (mergedRsts[llmSelect.rstIndex] || null) : null;
  // 若 LLM 选的餐厅通过过滤则直接用，否则降级到规则过滤列表
  const preferredRst = (votedRst && filteredRsts.find(r => r.poi_id === votedRstId))
    ? votedRst
    : (llmRstCandidate && filteredRsts.includes(llmRstCandidate) ? llmRstCandidate : null);

  let chosenRst = null;

  // 🔴 亮点3：基于真实世界的时间差计算引擎 (Real-world Time-Gap Engine)
  // 投票餐厅 > LLM推荐 > 规则过滤列表
  const rстCheckList = preferredRst
    ? [preferredRst, ...filteredRsts.filter(r => r !== preferredRst)]
    : filteredRsts;
  for(let i=0; i<Math.min(rстCheckList.length, 3); i++) {
    const r = rстCheckList[i];
    await reactor.addStep("act","check_availability(poi='"+r.poi_id+"', type='restaurant')", 300);

    // 模拟无票场景：第一家若 hasWait 极高则触发 no_seat 故障
    if (i === 0 && r.waitCount != null && r.waitCount > 15) {
      await reactor.addStep("warn", `[无座] ${r.name} 排队${r.waitCount}桌（>${r.waitCount*4}分钟），触发备选`, 200);
    }

    if(r.hasWait && r.waitCount > 5) {
      const waitMin = r.waitCount * 4; 
      const commuteMin = commuteMinutes(distanceKmBetween(chosenAct.location, r.location) ?? r.dist);
      if (waitMin > commuteMin) {
        await reactor.addStep("warn", r.name+` 排队约${waitMin}分钟（无座），通勤${commuteMin}分钟`, 300);
        await reactor.addStep("reason", "排队 > 通勤，触发时间差统筹引擎", 200);
        await reactor.addStep("ok", `确认预订后可取号，建议先逛 ${waitMin - commuteMin} 分钟`, 200);
        chosenRst = r;
        chosenRst.timeGapMsg = `确认预订后可取号，距排到约 ${waitMin} 分钟。<br>建议在附近多逛 <b class="text-orange-600">${waitMin - commuteMin} 分钟</b>后再打车。`;
        break;
      }
    } else {
      await reactor.addStep("ok",r.name+" 余位充足，确认选定", 200);
      chosenRst = r;
      break;
    }
  }
  if(!chosenRst) chosenRst = filteredRsts[0];

  // 等待流式思维链完成（不输出摘要气泡）
  if (thinkChain) {
    await thinkChain.promise;
  }

  // LLM 生成个性化推荐理由（有 Key 时覆盖默认 reason）
  if (llmActive) {
    await reactor.addStep("act", `gen_reason(llm='GLM', act='${chosenAct.name}', rst='${chosenRst.name}')`, 300);
    const llmReason = await genReasonWithLLM(chosenAct, chosenRst, intent, weather);
    if (llmReason) {
      chosenAct.reason = llmReason;
      chosenRst.reason = null; // 推荐理由已合并到活动里
      await reactor.addStep("ok", `→ LLM 生成推荐理由：「${llmReason.slice(0,40)}${llmReason.length>40?'…':''}」`, 200);
    }
  }

  // 深度思考块3：最终方案自检
  await reactor.addThink([
    `最终方案自检 (Self-Reflection)：`,
    `  活动：${chosenAct.name}`,
    `  → 距离 ${chosenAct.dist != null ? chosenAct.dist+'km' : '—'}  评分 ${fmtRating(chosenAct.rating)}  价格 ${fmtPrice(chosenAct.price)}`,
    `  → 儿童友好：${chosenAct.tags.includes('儿童友好')||chosenAct.tags.includes('亲子') ? '是 ✓' : '待确认'}`,
    ``,
    `  餐厅：${chosenRst.name}`,
    `  → 距离 ${chosenRst.dist}km ✓  低卡选项：${chosenRst.diet.length>0?'有 ✓':'无'}  儿童椅：${chosenRst.childFriendly?'有 ✓':'无'}`,
    chosenRst.hasWait ? `  → ⚠ 排队 ${chosenRst.waitCount*4}分钟，已触发时间差引擎提前取号` : `  → 无需等位 ✓`,
    ``,
    `结论：所有约束均满足，可生成时间轴并提交预订`,
  ], 200);

  await reactor.addStep("reason","生成可视化时间轴", 200);

  // 改进1: 节假日/营业时间主动检查
  await reactor.addStep("act",`check_holiday_status(date='明日·五一', pois=['${chosenAct.poi_id}','${chosenRst.poi_id}'])`, 300);
  const holidayPois = [chosenAct, chosenRst].filter(p => p && p.holidayNote);
  if (holidayPois.length > 0) {
    for (const p of holidayPois) {
      await reactor.addStep("warn", p.holidayNote, 150);
    }
    await reactor.addStep("reason", "已在方案卡片中标注节假日提醒，用户需知晓", 150);
  } else {
    await reactor.addStep("ok", "节假日状态正常，均可正常到访 ✓", 150);
  }

  // ── 时间冲突检测（异常类型3：time_conflict）──
  {
    const actDurMin = Math.round((chosenAct.duration || 2) * 60);
    const transitMin = commuteMinutes(distanceKmBetween(chosenAct.location, chosenRst.location) ?? chosenRst.dist);
    const mealMin = 90;
    const totalMin = actDurMin + transitMin + mealMin;
    const availMin = (intent.durationHours || 4) * 60;
    await reactor.addStep("act", `check_time_conflict(steps=[${escapeHtml(chosenAct.name)},${escapeHtml(chosenRst.name)}], window=${availMin}min)`, 250);
    if (totalMin > availMin) {
      await reactor.addStep("warn", `时间冲突：活动${actDurMin}min + 交通${transitMin}min + 用餐${mealMin}min = ${totalMin}min，超出窗口${availMin}min，已压缩活动时长 ✓`, 200);
    } else {
      await reactor.addStep("ok", `时间校验通过：总行程 ${totalMin}min ≤ 窗口 ${availMin}min ✓`, 150);
    }
  }

  reactor.seal();
  await sleep(400);

  // 酒店/民宿、景点全部使用高德真实搜索结果
  const effectiveHotel = needsHotel ? chosenHotel : null;
  const effectiveAttraction = (() => {
    if ((intent.durationH || 4) < 6) return null;
    const actCost = chosenAct.price || 0;
    const rstCost = chosenRst.price || 0;
    const budgetLeft = intent.maxBudget != null ? intent.maxBudget - actCost - rstCost : Infinity;
    const withinBudget = realAttractions.filter(poi => poi.poi_id !== chosenAct.poi_id && (poi.price || 0) <= budgetLeft);
    return (withinBudget[0] || realAttractions.find(poi => poi.poi_id !== chosenAct.poi_id) || null);
  })();

  globalCurrentPlan = { act: chosenAct, rst: chosenRst, intent: intent, weather, hotel: effectiveHotel, attraction: effectiveAttraction, realActs, realRsts, realHotels, realAttractions };

  // 方案开头：模型简洁引导语
  const introText = (() => {
    const budget = intent.maxBudget ? `预算 ¥${intent.maxBudget} 以内，` : '';
    const group  = { '朋友':'朋友局', '情侣':'情侣出行', '亲子':'亲子游', '同学':'同学聚', '宠物':'遛宠', '独处':'独处放松' }[intent.groupType] || intent.groupType;
    return `好的！已为你的${group}定制周末方案，${budget}活动 + 餐厅一条龙安排好了，快看看合不合心意 👇`;
  })();
  appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs leading-relaxed">${escapeHtml(introText)}</div>`);

  renderPlanCard(chosenAct, chosenRst, intent, false, null, weather, effectiveHotel, effectiveAttraction);
  agentMetrics.endPlan(true);

  // 方案质量自评分 & 评估摘要（仅首次，非重规划）
  if (!isVoted) {
    evaluatePlanQuality(chosenAct, chosenRst, intent, weather, effectiveAttraction, effectiveHotel);
  }

  if (!isVoted) appendFollowupChips();
}

// ── 方案质量评分器 ────────────────────────────────────
function evaluatePlanQuality(act, rst, intent, weather, attraction, hotel) {
  const scores = {};
  const planHours = intent.durationH || 4;
  const distAct = act?.dist ?? 99;
  const distRst = rst?.dist ?? 99;
  const maxDist = intent.maxDist || (planHours <= 4.5 ? 12 : planHours >= 24 ? 180 : 80);

  // 1. 人群匹配度
  const poiText = `${act?.name||''}${act?.type||''}${act?.tags?.join('')||''}${rst?.name||''}${rst?.cuisine||''}`;
  let groupScore = 3;
  if (intent.groupType === '亲子' && /儿童|亲子|家庭|乐园|科学|动物/.test(poiText)) groupScore = 5;
  else if (intent.groupType === '亲子' && !/儿童|亲子|家庭/.test(poiText)) groupScore = 2;
  else if (intent.groupType === '情侣' && /浪漫|艺术|展览|私密|咖啡|花/.test(poiText)) groupScore = 5;
  else if (intent.groupType === '独处' && /书店|咖啡|公园|博物馆|美术馆/.test(poiText)) groupScore = 5;
  else if (intent.hasPet && act?.tags?.includes('宠物友好')) groupScore = 5;
  scores.groupMatch = groupScore;

  // 2. 距离匹配度
  if (distAct <= maxDist * 0.4) scores.distMatch = 5;
  else if (distAct <= maxDist * 0.7) scores.distMatch = 4;
  else if (distAct <= maxDist) scores.distMatch = 3;
  else scores.distMatch = 1;

  // 3. 时间合理性（活动+餐厅+交通 是否能排下）
  const actDur = act?.duration || 2;
  const commuteH = Math.min(distAct * 4 + 10, 60) / 60;
  const mealDur = 1.2;
  const totalH = actDur + commuteH + mealDur + (attraction ? (attraction.duration || 2) : 0);
  const ratio = totalH / planHours;
  if (ratio >= 0.65 && ratio <= 1.1) scores.timeReason = 5;
  else if (ratio < 0.65) scores.timeReason = 3;
  else scores.timeReason = 2;

  // 4. 预算匹配度
  if (intent.maxBudget) {
    const totalCost = (act?.price || 100) + (rst?.price || 90);
    if (totalCost <= intent.maxBudget) scores.budgetMatch = 5;
    else if (totalCost <= intent.maxBudget * 1.2) scores.budgetMatch = 3;
    else scores.budgetMatch = 1;
  } else {
    scores.budgetMatch = 4; // 无预算约束，默认合理
  }

  // 5. 天气适配度
  const isOutdoor = /公园|户外|登山|骑行|露营|野餐|广场/.test(`${act?.type||''}${act?.name||''}`);
  const hasBadWeather = /雨|暴|雷/.test(weather?.desc || '');
  if (hasBadWeather && isOutdoor) scores.weatherFit = 1;
  else if (hasBadWeather && !isOutdoor) scores.weatherFit = 5;
  else scores.weatherFit = 4;

  // 6. 可执行性（有位/余票/营业）
  const hasWait = rst?.hasWait;
  const isClosed = rst?.hours && /休息|暂停/.test(rst.hours);
  scores.executability = isClosed ? 1 : hasWait ? 3 : 5;

  // 7. 推荐可解释性（有没有推荐理由）
  scores.explainability = (act?.reason || rst?.reason) ? 5 : 3;

  scores.total = Math.round(Object.values(scores).reduce((a, b) => a + b, 0) / Object.keys(scores).length * 10) / 10;
  return scores;
}

async function localRepaintRestaurant(intent) {
  const plan = globalCurrentPlan;
  if (!plan?.act || !plan?.rst) return;
  const act = plan.act;
  const oldRst = plan.rst;
  const candidates = (plan.realRsts || [])
    .filter(r => r.poi_id !== oldRst.poi_id)
    .filter(r => !intent.hasChild || r.childFriendly)
    .filter(r => {
      if (!intent.maxBudget || r.price == null) return true;
      const actCost = act.price != null ? act.price : 0;
      return r.price <= Math.max(30, intent.maxBudget - actCost);
    })
    .sort((a, b) => {
      const da = distanceKmBetween(act.location, a.location) ?? a.dist ?? 999;
      const db = distanceKmBetween(act.location, b.location) ?? b.dist ?? 999;
      const wa = a.hasWait ? (a.waitCount || 0) * 4 : 0;
      const wb = b.hasWait ? (b.waitCount || 0) * 4 : 0;
      return da - db || wa - wb || (b.rating || 0) - (a.rating || 0) || (a.price || 999) - (b.price || 999);
    });
  const nextRst = candidates[0] || (plan.realRsts || []).find(r => r.poi_id !== oldRst.poi_id) || oldRst;
  agentMetrics.localReplans++;
  agentMetrics.planReplaced++;
  updatePreferenceFromFeedback('change_restaurant');
  appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs leading-relaxed">收到，不重新规划全程，只把餐厅换掉，活动和时间保持不变。</div>`);
  await sleep(250);
  plan.rst = nextRst;
  plan.intent = intent;
  globalCurrentPlan = plan;
  renderPlanCard(act, nextRst, intent, true, '局部重绘：已更换餐厅', plan.weather, plan.hotel, plan.attraction);
}

function renderPlanCard(chosenAct, chosenRst, intent, isReplan, replanNote, weather, chosenHotel = null, chosenAttraction = null) {
  const planHours = intent.durationH || intent.durationHours || 4;
  const planTitle = (() => {
    if (intent.dateLabel) return `${intent.dateLabel}方案`;
    const h = parseInt(intent.startTime.split(':')[0], 10);
    return h < 11 ? '今天上午方案' : h < 14 ? '今天中午方案' : h < 17 ? '今天下午方案' : h < 21 ? '今晚方案' : '夜间方案';
  })();
  const desiredEnd = calcTime(intent.startTime, planHours);
  const isHalfDayPlan = planHours <= 4.5;
  const isFullDayPlan = planHours >= 8;
  const [startH,startM] = intent.startTime.split(':').map(Number);
  const toMinutes = (time) => {
    const [h, m] = String(time).split(':').map(Number);
    return h * 60 + (m || 0);
  };
  const fromMinutes = (minutes) => `${String(Math.floor(((minutes % 1440) + 1440) % 1440 / 60)).padStart(2,'0')}:${String(((minutes % 60) + 60) % 60).padStart(2,'0')}`;
  const maxClockTime = (...times) => fromMinutes(Math.max(...times.filter(Boolean).map(toMinutes)));
  const minClockTime = (...times) => fromMinutes(Math.min(...times.filter(Boolean).map(toMinutes)));
  const actDuration = isHalfDayPlan
    ? Math.min(Math.max(chosenAct.duration || 1.5, 1.5), 2)
    : Math.min(Math.max(chosenAct.duration || 2, planHours >= 10 ? 2.5 : 2), planHours >= 10 ? 3 : 2.5);
  const actEnd = calcTime(intent.startTime, actDuration);
  const rstPoolForMeals = globalCurrentPlan?.realRsts || [chosenRst];
  const mealCandidateDistance = (fromPoi, poi) => distanceKmBetween(fromPoi?.location || chosenAct.location, poi?.location) ?? poi?.dist ?? 999;
  const lunchRst = chosenRst;
  const dinnerRst = isFullDayPlan
    ? (rstPoolForMeals
        .filter(r => r.poi_id !== chosenRst.poi_id && (intent.hasChild ? r.childFriendly : true))
        .sort((a, b) => mealCandidateDistance(chosenAttraction || chosenAct, a) - mealCandidateDistance(chosenAttraction || chosenAct, b))[0]
      || rstPoolForMeals.find(r => r.poi_id !== chosenRst.poi_id)
      || chosenRst)
    : chosenRst;
  // 餐饮时间：全天方案强制拆成午餐 + 晚餐；半日/短线仍保留单餐或下午茶
  let mealAnchor = actEnd;
  let attrStart = null, attrEnd = null;
  let lunchTime = null, lunchEnd = null;
  const actToAttrDist = chosenAttraction ? distanceKmBetween(chosenAct.location, chosenAttraction.location) : null;
  const actToRstDist = distanceKmBetween(chosenAct.location, chosenRst.location) ?? chosenRst.dist;
  const actToLunchDist = distanceKmBetween(chosenAct.location, lunchRst.location) ?? lunchRst.dist;
  const lunchToAttrDist = chosenAttraction ? distanceKmBetween(lunchRst.location, chosenAttraction.location) : null;
  const attrToDinnerDist = chosenAttraction ? distanceKmBetween(chosenAttraction.location, dinnerRst.location) : null;
  const attrToRstDist = chosenAttraction ? distanceKmBetween(chosenAttraction.location, chosenRst.location) : null;
  const lunchToDinnerDist = distanceKmBetween(lunchRst.location, dinnerRst.location) ?? dinnerRst.dist;
  if (isFullDayPlan) {
    lunchTime = minClockTime(maxClockTime(calcTime(actEnd, commuteMinutes(actToLunchDist) / 60), '12:00'), '12:45');
    lunchEnd = calcTime(lunchTime, 1.2);
    if (chosenAttraction) {
      attrStart = calcTime(lunchEnd, commuteMinutes(lunchToAttrDist ?? chosenAttraction.dist) / 60);
      const attractionDuration = Math.min(Math.max(chosenAttraction.duration || 2, 2), planHours >= 10 ? 3 : 2.5);
      attrEnd = calcTime(attrStart, attractionDuration);
      mealAnchor = attrEnd;
    } else {
      mealAnchor = lunchEnd;
    }
  } else if (chosenAttraction) {
    attrStart = calcTime(actEnd, commuteMinutes(actToAttrDist ?? chosenAttraction.dist) / 60);
    const attractionDuration = Math.min(Math.max(chosenAttraction.duration || 2, planHours >= 10 ? 2 : 1.5), planHours >= 10 ? 3 : 2.2);
    attrEnd   = calcTime(attrStart, attractionDuration);
    mealAnchor = attrEnd;
  }
  let dinnerTime = isFullDayPlan
    ? minClockTime(maxClockTime(calcTime(mealAnchor, commuteMinutes(chosenAttraction ? attrToDinnerDist : lunchToDinnerDist) / 60), '18:00'), '19:00')
    : calcTime(mealAnchor, commuteMinutes(chosenAttraction ? attrToRstDist : actToRstDist) / 60);
  if (isHalfDayPlan) {
    const mealStartLimit = calcTime(intent.startTime, Math.max(1.8, planHours - 1.5));
    const [dh, dm] = dinnerTime.split(':').map(Number);
    const [lh, lm] = mealStartLimit.split(':').map(Number);
    if (dh * 60 + dm > lh * 60 + lm) dinnerTime = mealStartLimit;
  }
  let dinerEnd = calcTime(dinnerTime, isHalfDayPlan ? 1.2 : (isFullDayPlan ? 1.5 : 1.5));
  const [endH,endM] = dinerEnd.split(':').map(Number);
  const elapsedMin = ((endH*60+endM) - (startH*60+startM) + 1440) % 1440;
  if (isFullDayPlan && elapsedMin < planHours * 60 * 0.65) dinerEnd = desiredEnd;
  if (isHalfDayPlan) {
    const [targetH, targetM] = desiredEnd.split(':').map(Number);
    const currentEnd = ((parseInt(dinerEnd.split(':')[0],10) * 60 + parseInt(dinerEnd.split(':')[1],10)) - (startH * 60 + startM) + 1440) % 1440;
    const targetEnd = ((targetH * 60 + targetM) - (startH * 60 + startM) + 1440) % 1440;
    if (currentEnd > targetEnd) dinerEnd = desiredEnd;
  }
  // 根据用餐时刻智能判断餐次
  const _mealH = parseInt(dinnerTime.split(':')[0], 10);
  const mealLabel = isFullDayPlan ? '晚餐' : (_mealH >= 6  && _mealH < 10 ? '早餐'
                  : _mealH >= 10 && _mealH < 14 ? '午餐'
                  : _mealH >= 14 && _mealH < 17 ? '下午茶'
                  : _mealH >= 17 && _mealH < 21 ? '晚餐'
                  : '宵夜');
  const estimatePrice = (poi, fallback = 80) => {
    if (!poi) return 0;
    if (poi.price != null && Number.isFinite(Number(poi.price))) return Number(poi.price);
    const text = `${poi.type || ''}${poi.category || ''}${poi.cuisine || ''}${poi.name || ''}`;
    if (/酒店|民宿|住宿/.test(text)) return 300;
    if (/景点|展览|剧场|演出|乐园|运动|娱乐/.test(text)) return 120;
    if (/咖啡|甜品|下午茶|茶/.test(text)) return 60;
    if (/餐|火锅|烤肉|日料|西餐|中餐|小吃|美食/.test(text)) return 90;
    return fallback;
  };
  const actP = estimatePrice(chosenAct, 100);
  const rstP = estimatePrice(chosenRst, 90);
  const dinnerP = isFullDayPlan ? estimatePrice(dinnerRst, 90) : 0;
  const extraCost = estimatePrice(chosenHotel, 0) + estimatePrice(chosenAttraction, 0) + dinnerP;
  const totalCost = actP + rstP + extraCost;
  // Bug3 Fix：超预算时标红提示
  const overBudget = intent.maxBudget && totalCost > intent.maxBudget;
  const totalCostLabel = overBudget ? `¥${totalCost} ⚠️超预算` : `¥${totalCost}`;
  const actId = chosenAct.poi_id, rstId = chosenRst.poi_id;
  const cardId = Date.now();

  // Feature 1: 进度条 — 初始为"待确认出发"(0%)，预订成功后再激活推进
  let progressEpoch = null; // null = 未激活
  const totalDemoMs = 8 * 60 * 1000;
  const initSimPct = 15;

  function getProgressPct() {
    if (!progressEpoch) return 0;
    const elapsed = Date.now() - progressEpoch;
    return Math.min(initSimPct + Math.round((elapsed / totalDemoMs) * (100 - initSimPct)), 100);
  }
  const nodeActClass = (isReplan && replanNote && replanNote.includes("活动")) ? "node-changed" : (isReplan ? "node-locked" : "");
  const nodeRstClass = (isReplan && replanNote && !replanNote.includes("活动")) ? "node-changed" : (isReplan ? "node-locked" : "");

  function buildTimeline(act, rst, actEnd_, dinnerTime_, dinerEnd_, nodeAC, nodeRC, showReason) {
    const timelineAttraction = showReason ? null : chosenAttraction;
    const timelineAttrStart = showReason ? null : attrStart;
    const timelineAttrEnd = showReason ? null : attrEnd;
    const poiActionBtns = (poi) => {
      const linkBtn = poi.link ? `<a href="${escapeHtml(poi.link)}" target="_blank" class="mt-btn" style="text-decoration:none">查看详情 ↗</a>` : '';
      const phoneBtn = poi.phone ? `<a href="tel:${escapeHtml(poi.phone)}" class="mt-btn" style="background:white;color:#FFD100;border:1px solid #FFD100;text-decoration:none">📞 电话</a>` : '';
      return linkBtn || phoneBtn
        ? `<div class="flex gap-2 mt-1">${linkBtn}${phoneBtn}</div>`
        : `<button class="mt-btn" onclick="void 0">立即预订</button>`;
    };

    const formatTransit = (distanceKm) => {
      const distance = Number(distanceKm);
      if (!Number.isFinite(distance)) return { icon: '🚗', label: '驾车', minutes: '—', distanceText: '' };
      if (distance <= 2) {
        return { icon: '🚶', label: '步行', minutes: commuteMinutes(distance), distanceText: `${distance.toFixed(1)}km · ` };
      }
      return { icon: '🚗', label: '驾车', minutes: commuteMinutes(distance), distanceText: `${distance.toFixed(1)}km · ` };
    };
    const finalMealDistance = isFullDayPlan
      ? (timelineAttraction ? distanceKmBetween(timelineAttraction.location, rst.location) : distanceKmBetween(lunchRst.location, rst.location)) ?? rst.dist
      : (timelineAttraction ? attrToRstDist : actToRstDist);
    const transit = formatTransit(finalMealDistance);

    // 封面渐变色：活动=橙系，餐厅=红系，酒店=蓝系
    const actGrad = 'linear-gradient(135deg,#ff9a44,#FFD100)';
    const rstGrad = 'linear-gradient(135deg,#f97316,#dc2626)';
    const hotelGrad = 'linear-gradient(135deg,#60a5fa,#2563eb)';

    const buildCard = (poi, catEmoji, catLabel, timeFrom, timeTo, grad, nodeClass, reason) => {

      // 数据来源标注：高德实时 vs 演示数据
      const sourceBadge = poi.isReal === true
        ? `<span style="font-size:9px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:4px;padding:0 4px;flex-shrink:0">📍实时</span>`
        : `<span style="font-size:9px;background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0;border-radius:4px;padding:0 4px;flex-shrink:0">演示</span>`;
      const poiKey = storePoi({ ...poi, catEmoji, catLabel, grad }, catEmoji, catLabel, grad);
      // 紧凑横排：左侧方形缩略图 + 右侧文字

        ? `background:${grad};position:relative;overflow:hidden;width:76px;height:76px;flex-shrink:0;border-radius:0;`
        : `background:${grad};position:relative;width:76px;height:76px;flex-shrink:0;border-radius:0;display:flex;align-items:center;justify-content:center;`;
      const thumbInner = poi.img
        ? `<img src="${escapeHtml(poi.img)}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'">`
        : `<span style="font-size:28px">${catEmoji}</span>`;
      const reviewCount = poi.isReal ? '' : Math.floor(Math.random()*3000+500) + '条';
      const closedByTime = !isPoiOpenForStart(poi, timeFrom);
      const openStatus = (poi.hours && /休息|暂停|未开|闭馆/.test(poi.hours)) || closedByTime ? '休息中' : '营业中';
      const hoursText = poi.hours || `${timeFrom}-${timeTo}`;

      return `

          <div style="position:absolute;left:4px;top:14px;bottom:-2px;width:2px;background:#e5e7eb"></div>
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px">
            <span style="font-size:11px;color:#9ca3af;font-weight:600;white-space:nowrap">${timeRange}</span>
            <span style="font-size:11px;color:#d1d5db">|</span>
            <span style="font-size:12px;font-weight:700;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${catLabel}</span>
            ${sourceBadge}
          </div>
          <div class="mt-poi-card ${nodeClass}" onclick="openPoiDetail('${poiKey}')" style="cursor:pointer;display:flex;align-items:stretch;border-radius:12px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.08)">
            <div style="${thumbStyle}">${thumbInner}</div>
            <div style="flex:1;padding:9px 10px 9px 11px;min-width:0;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:3px;margin-bottom:4px">
                ${hotBadge}
                <span style="font-size:13px;font-weight:700;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${escapeHtml(poi.name)}</span>
                ${changeBadge}
                <span style="color:#c0c4cc;font-size:15px;flex-shrink:0;margin-left:2px">›</span>
              </div>
              <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
                <span style="color:#ff4d2e;font-size:11px;font-weight:700;flex-shrink:0">★ ${poi.rating ? poi.rating.toFixed(1) : '4.6'}</span>
                ${reviewCount ? `<span style="font-size:11px;color:#9ca3af;flex-shrink:0">${reviewCount}评价</span>` : ''}
                <span style="font-size:10px;color:#9ca3af;background:#f3f4f6;padding:1px 5px;border-radius:4px;flex-shrink:0">${catLabel}</span>
              </div>
              <div style="font-size:11px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                <span style="color:#10b981;font-weight:600">${openStatus}</span><span style="color:#9ca3af;margin-left:5px">${escapeHtml(hoursText)}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:#9ca3af">
                <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${escapeHtml(poi.address || '附近')}</span>
                ${Number.isFinite(Number(poi.dist)) ? `<span style="white-space:nowrap;flex-shrink:0;color:#9ca3af">${Number(poi.dist).toFixed(1)}km</span>` : ''}
              </div>
              ${holidayHtml}${reasonHtml}
            </div>
          </div>
        </div>`;

    const actCard = buildCard(act, '🎭', act.type || '活动', intent.startTime, actEnd_, actGrad, nodeAC, showReason ? act.reason : '');

async function exportPlanLongImage(cardId) {
  const card = document.getElementById(`planCard_${cardId}`);
  const shareBtn = document.getElementById(`shareBtn_${cardId}`);
  if (!card) return;
  if (!window.html2canvas) {
    appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-red-500 max-w-xs">长图组件加载失败，请检查网络后重试。</div>`);
    return;
  }
  const oldText = shareBtn ? shareBtn.textContent : '';
  if (shareBtn) { shareBtn.textContent = '…'; shareBtn.disabled = true; }
  let clone = null;
  try {
    clone = card.cloneNode(true);
    clone.querySelector(`#planActions_${cardId}`)?.remove();
    clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
    clone.querySelectorAll('[onclick]').forEach(el => el.removeAttribute('onclick'));
    clone.classList.add('share-export-card');
    Object.assign(clone.style, {
      position: 'fixed',
      left: '-10000px',
      top: '0',
      width: '360px',
      maxWidth: '360px',
      background: '#fff',
      color: '#1f2937',
      boxShadow: 'none',
      transform: 'none'
    });
    clone.querySelectorAll('div,span').forEach(el => {
      const text = (el.textContent || '').trim();
      if (/人均约|待确认|¥|免费/.test(text) && text.length <= 12) {
        el.style.fontFamily = '-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif';
        el.style.fontVariantLigatures = 'none';
        el.style.fontFeatureSettings = 'normal';
        el.style.textRendering = 'auto';
      }
    });
    document.body.appendChild(clone);
    clone.querySelectorAll('img').forEach(img => img.crossOrigin = 'anonymous');
    await Promise.all([...clone.querySelectorAll('img')].map(img => img.complete ? Promise.resolve() : new Promise(resolve => { img.onload = img.onerror = resolve; })));
    if (document.fonts?.ready) await document.fonts.ready;
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    const exportWidth = 360;
    const exportHeight = Math.ceil(clone.getBoundingClientRect().height);
    const canvas = await html2canvas(clone, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: exportWidth,
      height: exportHeight,
      windowWidth: exportWidth,
      windowHeight: exportHeight,
      scrollX: 0,
      scrollY: 0
    });
    clone.remove();
    clone = null;
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.95));
    if (!blob) throw new Error('empty image');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `周末行程-${cardId}.png`;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
    appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs">已生成并下载 1 张行程长图。</div>`);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  } catch(e) {
    if (clone) clone.remove();
    appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-red-500 max-w-xs">生成长图失败，请稍后重试。</div>`);
  } finally {
    if (shareBtn) { shareBtn.textContent = oldText || '↗'; shareBtn.disabled = false; }
  }
}

function showRatingCard() {
  if (document.getElementById('ratingCard')) return;
  const el = appendBubble(`

      <p class="text-xs text-gray-400 mb-3">你的反馈帮助我下次规划得更好</p>
      <div class="flex gap-3 justify-center text-3xl mb-3" id="ratingStars">
        ${[1,2,3,4,5].map(n=>`<span class="cursor-pointer opacity-40 hover:opacity-100 transition" data-score="${n}" onclick="submitRating(${n})">⭐</span>`).join('')}
      </div>
      <div id="ratingReasonArea" style="display:none">
        <p class="text-xs text-gray-500 mb-2">是什么影响了你的体验？</p>
        <div class="flex flex-wrap gap-2" id="ratingReasonChips"></div>
        <div id="ratingInsightArea" style="display:none;margin-top:8px"></div>
      </div>
    </div>
  `);
}

function submitRating(score) {
  const stars = document.querySelectorAll('#ratingStars span');
  stars.forEach((s, i) => { s.style.opacity = i < score ? '1' : '0.25'; });
  stars.forEach(s => s.style.pointerEvents = 'none');
  const reasonMap = {
    1: ['方案不符合需求','地点太远','价格偏高','不适合出行人群','信息有误'],
    2: ['距离偏远','餐厅不够理想','路线不合理','时间安排偏长','信息可能过期'],
    3: ['大致还行','有一两处可以更好','路线可以更紧凑','想要不同风格'],
    4: ['整体不错','路线清晰','推荐理由很合理','下次继续用'],
    5: ['非常满意','已分享给朋友','路线可执行性强','覆盖了所有需求'],
  };
  const reasons = reasonMap[score] || [];
  const reasonArea = document.getElementById('ratingReasonArea');
  const chipEl = document.getElementById('ratingReasonChips');
  if (reasonArea && chipEl) {
    chipEl.innerHTML = reasons.map(r =>
      `<span class="followup-chip text-xs cursor-pointer" onclick="selectRatingReason('${escapeHtml(r)}', ${score})">${r}</span>`
    ).join('');
    reasonArea.style.display = '';
  }
}

function selectRatingReason(reason, score) {
  const chips = document.querySelectorAll('#ratingReasonChips .followup-chip');
  chips.forEach(c => { c.style.opacity = c.textContent.trim() === reason ? '1' : '0.4'; c.style.pointerEvents = 'none'; });
  agentMetrics.addRating(score, reason);
  const insightArea = document.getElementById('ratingInsightArea');
  if (!insightArea) return;
  const lowScore = score <= 2;
  const insight = lowScore
    ? `收到，我会针对"${reason}"方向改进下次的推荐策略。`
    : `很高兴"${reason}"符合你的预期，下次继续努力！`;
  insightArea.innerHTML = `<div class="text-xs text-gray-500 leading-relaxed bg-gray-50 rounded-lg px-3 py-2">${insight}</div>`;
  insightArea.style.display = '';
  setTimeout(() => {
    appendBubble(`<div class="bubble-ai px-4 py-2 text-sm text-gray-600">谢谢反馈！${score >= 4 ? '下次见 👋' : '我会继续改进的 💪'}</div>`);
  }, 500);
}

// 根据选中组合生成话术
function buildWizardText() {
  const p = wizardSelections.people;
  const d = wizardSelections.duration;
  const v = wizardSelections.vibe;
  const pText = p ? PEOPLE_MAP[p] : null;
  const dText = d ? DURATION_MAP[d] : null;
  const vText = v ? VIBE_MAP[v] : null;
  const isSolo = p === '独处放松';
  const self = isSolo ? '我' : '我们';
  const help = isSolo ? '帮我' : '帮我们';
  const together = isSolo ? '' : '一起';
  if (p && !d && !v) return `这周末打算${pText}。${help}挑个合适的地方，生成一套周末方案吧！`;
  if (!p && d && !v) return `这周末我有${dText}的空闲时间。帮我出个点子，看怎么安排最充实`;
  if (!p && !d && v) return `这周末特别想体验${vText}的感觉。帮我找找周边符合这个调性的高分好店和路线吧`;
  if (p && d && !v) return `这周末想${pText}，${together}安排${dText}的活动。至于去哪玩、什么风格，你看着办，${help}推荐个闭环方案！`;
  if (p && !d && v) return `今天打算${pText}去体验${vText}。帮我盘一下周边最合适的去处，时间跨度你来帮我合理把控。`;
  if (!p && d && v) return `这周末想抽空来一次${dText}的${vText}体验。同行人员不限，请为我量身定制一套高分路线。`;
  if (p && d && v) return `我想安排一场${pText}的周末活动。今天${self}打算体验${vText}的风格，时间上帮我规划${dText}就行。请为${self}规划合适的路线~`;
  return '';
}

function buildWizardIntent() {
  const p = wizardSelections.people;
  const d = wizardSelections.duration;
  const durationMap = {
    '惬意上午时光': { startTime:'09:00', durationH:4 },
    '闲适午后时光': { startTime:'14:00', durationH:4 },
    '充实全天畅玩': { startTime:'10:00', durationH:11 },
    '两天一夜度假': { startTime:'10:00', durationH:32 },
  };
  const dur = d ? durationMap[d] : { startTime:'14:00', durationH:4 };
  const mockUserSpending = {
    avgOrder: 236,
    weekendAvg: 288,
    preferredRange: {
      '独处放松': 180,
      '浪漫双人': 320,
      '亲子家庭': 260,
      '朋友聚会': 200,
    }
  };
  return {
    groupType: p === '亲子家庭' ? '亲子' : p === '浪漫双人' ? '情侣' : p === '朋友聚会' ? '朋友' : p === '独处放松' ? '独处' : '朋友',
    partySize: p === '亲子家庭' ? 3 : p === '朋友聚会' ? 4 : p === '独处放松' ? 1 : 2,
    hasChild:  p === '亲子家庭',
    childAge:  p === '亲子家庭' ? 5 : null,
    hasPet:    false,
    onDiet:    false,
    maxDist:   d === '两天一夜度假' ? 100 : d === '充实全天畅玩' ? 30 : 8,
    startTime: dur.startTime,
    durationH: dur.durationH,
    durationHours: dur.durationH,
    maxBudget: mockUserSpending.preferredRange[p] || mockUserSpending.weekendAvg,
    transport: d === '两天一夜度假' ? 'drive' : 'taxi',
    intensity: wizardSelections.vibe === '疯狂高能放电' ? 'high' : wizardSelections.vibe === '室内舒适躺平' ? 'low' : 'medium',
    style:     p || '朋友',
    durationTag: d || '',
    vibe:      wizardSelections.vibe || '',
    rejection: null,
  };
}

function sendFromWizard() {
  if (isProcessing) return;
  const text = buildWizardText();
  if (!text) return;
  const prebuiltIntent = buildWizardIntent();
  isProcessing = true;
  lastUserText = text; altIndex = 0; selectedGifts.clear();
  document.getElementById("userInput").value = "";
  appendBubble(escapeHtml(text), true);
  sleep(300).then(async () => {
    try {
      await runAgentFlow(text, 0, false, prebuiltIntent);
    } catch(e) {
      console.error('[Agent Error]', e);
      appendBubble('<div class="bubble-ai px-4 py-3 text-sm text-red-500">出错了，请重试 🔄</div>');
    } finally {
      isProcessing = false;
    }
  });
}

function appendFollowupChips() {
  const chat = document.getElementById("chatArea");
  if (!chat) return;
  const chipRow = document.createElement("div");
  chipRow.className = "flex flex-col gap-1.5 mt-2 fadein";
  chipRow.style.paddingLeft = "4px";
  chipRow.innerHTML = `
    <span class="text-xs text-gray-400">继续问：</span>
    <div class="flex flex-wrap gap-2 justify-start">
      <button class="followup-chip" onclick="quickFeedback('cuisine')">🔄 换一个餐厅</button>
      <button class="followup-chip" onclick="quickFeedback('activity')">🎭 换个活动</button>
      <button class="followup-chip" onclick="quickSend('更近一点')">📍 换个近一点的</button>
      <button class="followup-chip" onclick="quickSend('便宜一点')">💰 预算低一些</button>
      <button class="followup-chip" onclick="quickSend('宠物')">🐶 突发带狗</button>
      <button class="followup-chip" onclick="showAlternatives()">🔀 换套方案</button>
    </div>
  `;
  chat.appendChild(chipRow);
  scrollBottom();
}

function quickSend(scene) {
  const text = SCENE_PRESETS[scene];
  if(text) {
    const input = document.getElementById("userInput");
    input.value = text;
    input.focus();
    input.selectionStart = input.selectionEnd = text.length;
  }
}

function quickFeedback(type) {
  const text = FEEDBACK_PRESETS[type];
  if(text) {
    const input = document.getElementById("userInput");
    input.value = text;
    input.focus();
    input.selectionStart = input.selectionEnd = text.length;
  }
}

// 改进2: Plan A/B Tab 切换
function switchPlanTab(cardId, plan) {
  const tab = document.getElementById(`planTab_${cardId}`);
  if (!tab) return;
  tab.querySelectorAll('.plan-tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && plan === 'A') || (i === 1 && plan === 'B'));
  });
  const paneA = document.getElementById(`planPane_A_${cardId}`);
  const paneB = document.getElementById(`planPane_B_${cardId}`);
  if (paneA) paneA.classList.toggle('active', plan === 'A');
  if (paneB) paneB.classList.toggle('active', plan === 'B');
  // 更新预订按钮文案
  const bookBtn = document.getElementById(`bookBtn_${cardId}`);
  if (bookBtn) bookBtn.textContent = `✨ 确认方案 Plan ${plan}`;
}

async function sendMessage() {
  if(isProcessing) return;
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  isProcessing = true;
  input.value = ""; input.style.height = "";
  lastUserText = text; altIndex = 0; selectedGifts.clear();

  appendBubble(escapeHtml(text).replace(/\n/g,"<br>"), true);
  await sleep(300);

  // 立即显示 thinking，让用户知道在处理
  const shouldUseLocalRepaint = !!globalCurrentPlan && /不想吃|换餐厅|换家|不喜欢这家|别吃这个/.test(text);
  const thinking = shouldUseLocalRepaint ? null : appendThinking();
  try {
    const mode = await classifyMessage(text);
    if (thinking) thinking.remove();
    if (mode === 'chat') {
      await handleChat(text);
    } else {
      await runAgentFlow(text, 0, false);
    }
  } catch(e) {
    if (thinking) thinking.remove();
    console.error('[Agent Error]', e);
    appendBubble('<div class="bubble-ai px-4 py-3 text-sm text-red-500">出错了，请重试 🔄</div>');
  } finally {
    isProcessing = false;
  }
}

// 判断消息是闲聊还是规划请求
async function classifyMessage(text) {
  // 有明确规划意图关键词 → 直接走规划（不调 LLM，零延迟）
  if (/出去玩|出行|周末|活动|规划|安排|带孩|带狗|约会|聚会|方案|太贵|换餐|换活动|不想吃|不想去|玩什么|去哪|行程|景点|餐厅|预订|预算|人均/.test(text)) {
    return 'plan';
  }
  // 明确闲聊词 → 直接走闲聊
  if (/你好|hello|hi|你是谁|你是什么|能做什么|怎么用|功能|介绍/.test(text)) {
    return 'chat';
  }
  // 有 LLM 时让它判断（3s 超时，只需一个词）
  if (llmAppKey) {
    const result = await callLLM([
      { role: 'system', content: '判断用户消息是"闲聊"还是"出行规划请求"。只回复 chat 或 plan，不要其他内容。' },
      { role: 'user',   content: text }
    ], 8, 3000);
    if (result && result.trim().toLowerCase().startsWith('plan')) return 'plan';
    if (result && result.trim().toLowerCase().startsWith('chat')) return 'chat';
  }
  // 无 LLM 时：短句 → 闲聊，否则 → 规划
  return text.length < 10 ? 'chat' : 'plan';
}

// 闲聊处理（有 LLM 走 LLM，否则规则回复）
async function handleChat(text) {
  const thinking = appendThinking();
  let reply = null;

  if (llmAppKey) {
    reply = await callLLM([
      { role: 'system', content: `你是周末规划助手，一个专注周末出行计划的助手。先自然回应用户问题，再把话题轻轻引导回确认/调整周末方案。回答简洁友好，不超过80字。
如果用户问你能做什么，说明你能：帮规划周末行程、搜索附近活动/餐厅、查天气；预订/支付必须由用户确认。
不要假装自己能做其他无关的事。` },
      { role: 'user', content: text }
    ], 160);
  }

  thinking.remove();

  if (!reply) {
    // 规则回复兜底
    if (/你好|hello|hi/.test(text)) {
      reply = '你好！我可以继续帮你确认或微调周末方案，也可以直接基于偏好重新规划。';
    } else if (/你是谁|你是什么|介绍/.test(text)) {
      reply = '我是周末规划助手，专门帮你生成可调整的周末计划。你可以确认当前方案，也可以告诉我想换什么。';
    } else if (/能做什么|怎么用|功能/.test(text)) {
      reply = '我能帮你规划行程、匹配真实 POI、查天气和生成周末计划卡。你可以先确认当前方案。';
    } else {
      reply = '收到，我先帮你把注意力拉回方案：可以确认当前方案，或告诉我想换餐厅/活动。';
    }
  }

  appendBubble(`<div class="bubble-ai px-4 py-3 text-sm text-gray-700 max-w-xs leading-relaxed">${escapeHtml(reply)}</div>`);
  renderPlanConfirmCard();
  appendFollowupChips();
}
